<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shadow - Library</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Kantumruy+Pro:wght@400;600;700&display=swap');
        body { font-family: 'Kantumruy Pro', sans-serif; background-color: #f8f9fa; color: #333; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .tab-active { border-bottom: 3px solid #3b82f6; color: #3b82f6; font-weight: bold; }
    </style>
</head>
<body class="pb-24">

    <header class="sticky top-0 z-50 bg-white shadow-sm">
        <div class="px-5 py-4 flex justify-between items-center">
            <h1 class="text-xl font-extrabold text-gray-900">បណ្ណាល័យ</h1>
            <div class="flex space-x-4 text-gray-500">
                <i class="fas fa-history text-lg"></i>
                <i class="fas fa-cog text-lg"></i>
            </div>
        </div>
        <div class="flex justify-around text-gray-400 text-sm font-semibold border-b">
            <button class="flex-1 py-3 tab-active">កំពុងអាន</button>
            <button class="flex-1 py-3 hover:text-blue-600 transition-colors">ការទាញយក</button>
            <button class="flex-1 py-3 hover:text-blue-600 transition-colors">សៀវភៅសំណព្វ</button>
        </div>
    </header>

    <main class="feed-container max-w-[550px] mx-auto p-4 space-y-5">
        
        <div class="flex space-x-4 bg-white p-2 rounded-xl shadow-sm hover:shadow-md transition-shadow">
            <div class="w-24 h-32 rounded-lg overflow-hidden shrink-0 shadow-sm border">
                <img src="assets/fast/your_book_1.jpg" class="w-full h-full object-cover" onerror="this.src='https://via.placeholder.com/300x400?text=Shadow+Bride'">
            </div>
            <div class="flex flex-col justify-between py-1 flex-1">
                <div>
                    <h4 class="font-bold text-[15px] text-gray-800 line-clamp-1">Shadow Bride: The Lost Secret</h4>
                    <p class="text-[11px] text-gray-500 mt-1">បានអានដល់៖ ភាគទី ១៥/២០</p>
                </div>
                <div class="flex justify-between items-center">
                    <span class="text-[10px] bg-blue-50 text-blue-600 px-2 py-0.5 rounded-full font-bold">កំពុងបន្ត</span>
                    <button class="text-[11px] text-white bg-blue-600 px-4 py-1 rounded-full font-bold shadow-sm">អានបន្ត</button>
                </div>
            </div>
        </div>

        <div class="flex space-x-4 bg-white p-2 rounded-xl shadow-sm hover:shadow-md transition-shadow">
            <div class="w-24 h-32 rounded-lg overflow-hidden shrink-0 shadow-sm border">
                <img src="assets/fast/your_book_2.jpg" class="w-full h-full object-cover" onerror="this.src='https://via.placeholder.com/300x400?text=The+Last+Echo'">
            </div>
            <div class="flex flex-col justify-between py-1 flex-1">
                <div>
                    <h4 class="font-bold text-[15px] text-gray-800 line-clamp-1">The Last Echo: Echoes of Eternity</h4>
                    <p class="text-[11px] text-gray-500 mt-1">បានអានដល់៖ ភាគទី ៤៥/៤៥</p>
                </div>
                <div class="flex justify-between items-center">
                    <span class="text-[10px] bg-green-50 text-green-600 px-2 py-0.5 rounded-full font-bold">ចប់ហើយ</span>
                    <button class="text-[11px] text-blue-600 border border-blue-600 px-4 py-1 rounded-full font-bold">អានឡើងវិញ</button>
                </div>
            </div>
        </div>

        <div class="hidden py-20 text-center text-gray-400">
            <i class="fas fa-folder-open text-5xl mb-3 opacity-20"></i>
            <p class="text-sm font-bold uppercase tracking-widest">មិនទាន់មានសៀវភៅនៅឡើយ</p>
        </div>

    </main>

    <footer class="fixed bottom-0 w-full bg-white border-t border-gray-100 flex justify-around py-4 z-[100] shadow-[0_-5px_20px_rgba(0,0,0,0.05)] text-gray-400">
        <a href="index.html" class="text-center flex flex-col items-center hover:text-blue-600 transition-all">
            <i class="fas fa-heart text-[20px] mb-0.5"></i>
            <p class="text-[10px] font-bold">For You</p>
        </a>
        <a href="fast.html" class="text-center flex flex-col items-center hover:text-blue-600 transition-all">
            <i class="fas fa-play-circle text-[20px] mb-0.5"></i>
            <p class="text-[10px] font-bold">Fast</p>
        </a>
        <a href="discover.html" class="text-center flex flex-col items-center hover:text-blue-600 transition-all">
            <i class="fas fa-compass text-[20px] mb-0.5"></i>
            <p class="text-[10px] font-bold">Discover</p>
        </a>
        <a href="library.html" class="text-center text-blue-600 flex flex-col items-center transition-all">
            <i class="fas fa-book text-[22px] mb-0.5"></i>
            <p class="text-[10px] font-extrabold">Library</p>
        </a>
        <div class="text-center flex flex-col items-center hover:text-blue-600 cursor-pointer">
            <i class="fas fa-user text-[20px] mb-0.5"></i>
            <p class="text-[10px] font-bold">Me</p>
        </div>
    </footer>

</body>
</html>
