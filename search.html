<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shadow - Premium Discovery</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Kantumruy+Pro:wght@400;600;700&display=swap');
        
        :root {
            --shadow-primary: #6366f1; /* Indigo Accent */
            --shadow-accent: #ff3b5c;  /* Original Pink-Red */
        }

        body { 
            font-family: 'Plus Jakarta Sans', 'Kantumruy Pro', sans-serif; 
            background-color: #f8fafc; 
            color: #1e293b;
        }

        .premium-blur {
            backdrop-filter: blur(10px);
            background-color: rgba(255, 255, 255, 0.8);
        }

        .book-card {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .book-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 24px -8px rgba(0, 0, 0, 0.1);
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        .active-tab::after {
            content: "";
            position: absolute;
            bottom: -2px;
            left: 0;
            width: 100%;
            height: 3px;
            background: var(--shadow-primary);
            border-radius: 10px;
        }

        /* Ranking Colors */
        .rank-1 { background: linear-gradient(135deg, #fbbf24, #f59e0b); }
        .rank-2 { background: linear-gradient(135deg, #94a3b8, #64748b); }
        .rank-3 { background: linear-gradient(135deg, #d97706, #b45309); }
    </style>
</head>
<body class="pb-20">

    <header class="sticky top-0 z-[100] premium-blur border-b border-gray-100 px-4 py-4">
        <div class="max-w-3xl mx-auto flex items-center space-x-4">
            <button class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-gray-100 transition-colors">
                <i class="fa-solid fa-chevron-left text-lg"></i>
            </button>
            
            <div class="relative flex-1 group">
                <i class="fa-solid fa-magnifying-glass absolute left-4 top-1/2 -translate-y-1/2 text-gray-400 group-focus-within:text-indigo-500 transition-colors"></i>
                <input type="text" 
                       placeholder="Search books, authors, genres..." 
                       class="w-full bg-white border border-gray-200 py-3 pl-12 pr-12 rounded-2xl outline-none focus:ring-4 focus:ring-indigo-50/50 focus:border-indigo-400 transition-all text-[15px] shadow-sm">
                <button class="absolute right-4 top-1/2 -translate-y-1/2 text-gray-300 hover:text-gray-500">
                    <i class="fa-solid fa-circle-xmark"></i>
                </button>
            </div>
        </div>
    </header>

    <main class="max-w-3xl mx-auto px-4 mt-8">
        
        <section class="mb-10">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-sm font-bold uppercase tracking-wider text-gray-500">Recent Searches</h2>
                <button class="text-xs font-semibold text-indigo-600 hover:text-indigo-700">Clear All</button>
            </div>
            <div class="flex flex-wrap gap-2">
                <div class="bg-white border border-gray-100 px-4 py-2 rounded-full flex items-center space-x-2 shadow-sm hover:border-indigo-200 cursor-pointer transition-all group">
                    <span class="text-sm font-medium text-gray-700">Reaper of Soul</span>
                    <i class="fa-solid fa-xmark text-[10px] text-gray-400 group-hover:text-red-500"></i>
                </div>
                <div class="bg-white border border-gray-100 px-4 py-2 rounded-full flex items-center space-x-2 shadow-sm hover:border-indigo-200 cursor-pointer transition-all group">
                    <span class="text-sm font-medium text-gray-700">Goddess of Psychology</span>
                    <i class="fa-solid fa-xmark text-[10px] text-gray-400 group-hover:text-red-500"></i>
                </div>
                <div class="bg-white border border-gray-100 px-4 py-2 rounded-full flex items-center space-x-2 shadow-sm hover:border-indigo-200 cursor-pointer transition-all group">
                    <span class="text-sm font-medium text-gray-700">Shadow Monarch</span>
                    <i class="fa-solid fa-xmark text-[10px] text-gray-400 group-hover:text-red-500"></i>
                </div>
            </div>
        </section>

        <nav class="flex space-x-8 border-b border-gray-100 mb-8 overflow-x-auto no-scrollbar">
            <button class="relative pb-3 text-sm font-bold text-indigo-600 active-tab whitespace-nowrap">Trending Now</button>
            <button class="pb-3 text-sm font-semibold text-gray-400 hover:text-gray-600 whitespace-nowrap transition-colors">Popular</button>
            <button class="pb-3 text-sm font-semibold text-gray-400 hover:text-gray-600 whitespace-nowrap transition-colors">New Releases</button>
            <button class="pb-3 text-sm font-semibold text-gray-400 hover:text-gray-600 whitespace-nowrap transition-colors">Recommended</button>
        </nav>

        <div class="flex items-center space-x-3 mb-6">
            <div class="w-1.5 h-6 bg-indigo-600 rounded-full"></div>
            <h2 class="text-xl font-extrabold text-gray-900">Readers Are Loving</h2>
        </div>

        <div class="space-y-4">
            
            <div class="book-card bg-white p-4 rounded-3xl border border-gray-50 flex items-center space-x-4 cursor-pointer relative overflow-hidden">
                <div class="rank-1 absolute top-0 left-0 w-12 h-12 flex items-center justify-center rounded-br-2xl shadow-lg">
                    <span class="text-white font-black text-lg italic">1</span>
                </div>
                <div class="w-20 h-28 bg-gray-100 rounded-xl overflow-hidden shrink-0 shadow-md ml-6">
                    <img src="https://via.placeholder.com/200x300?text=Shadow" class="w-full h-full object-cover">
                </div>
                <div class="flex-1">
                    <div class="flex justify-between items-start">
                        <div>
                            <h3 class="font-extrabold text-[16px] text-gray-900 leading-tight mb-1">The Shadow's Legacy</h3>
                            <p class="text-sm font-medium text-gray-400">by Jonathan Wick</p>
                        </div>
                        <button class="w-8 h-8 flex items-center justify-center rounded-full bg-gray-50 text-gray-400 hover:text-indigo-600 transition-colors">
                            <i class="fa-regular fa-bookmark"></i>
                        </button>
                    </div>
                    <div class="flex items-center space-x-4 mt-4">
                        <div class="flex items-center text-[12px] font-bold text-indigo-500">
                            <i class="fa-solid fa-heart mr-1.5"></i> 24.5K
                        </div>
                        <div class="flex items-center text-[12px] font-bold text-gray-400">
                            <i class="fa-solid fa-eye mr-1.5"></i> 1.2M
                        </div>
                        <div class="flex items-center text-[12px] font-bold text-amber-500 bg-amber-50 px-2 py-0.5 rounded-lg">
                            <i class="fa-solid fa-star mr-1.5"></i> 4.9
                        </div>
                    </div>
                </div>
            </div>

            <div class="book-card bg-white p-4 rounded-3xl border border-gray-50 flex items-center space-x-4 cursor-pointer relative">
                <div class="rank-2 absolute top-0 left-0 w-10 h-10 flex items-center justify-center rounded-br-2xl shadow-md">
                    <span class="text-white font-black italic">2</span>
                </div>
                <div class="w-20 h-28 bg-gray-100 rounded-xl overflow-hidden shrink-0 shadow-md ml-4">
                    <img src="https://via.placeholder.com/200x300?text=Psych" class="w-full h-full object-cover">
                </div>
                <div class="flex-1">
                    <h3 class="font-extrabold text-[16px] text-gray-900 leading-tight mb-1">Mind Games</h3>
                    <p class="text-sm font-medium text-gray-400">by Sarah Drasner</p>
                    <div class="flex items-center space-x-4 mt-4">
                        <div class="flex items-center text-[12px] font-bold text-indigo-500"><i class="fa-solid fa-heart mr-1.5"></i> 18K</div>
                        <div class="flex items-center text-[12px] font-bold text-gray-400"><i class="fa-solid fa-eye mr-1.5"></i> 850K</div>
                        <div class="flex items-center text-[12px] font-bold text-amber-500 bg-amber-50 px-2 py-0.5 rounded-lg"><i class="fa-solid fa-star mr-1.5"></i> 4.7</div>
                    </div>
                </div>
            </div>

            <div class="book-card bg-white p-4 rounded-3xl border border-gray-50 flex items-center space-x-4 cursor-pointer relative">
                <div class="rank-3 absolute top-0 left-0 w-10 h-10 flex items-center justify-center rounded-br-2xl shadow-md">
                    <span class="text-white font-black italic">3</span>
                </div>
                <div class="w-20 h-28 bg-gray-100 rounded-xl overflow-hidden shrink-0 shadow-md ml-4">
                    <img src="https://via.placeholder.com/200x300?text=Soul" class="w-full h-full object-cover">
                </div>
                <div class="flex-1">
                    <h3 class="font-extrabold text-[16px] text-gray-900 mb-1">Reaper of Soul</h3>
                    <p class="text-sm font-medium text-gray-400">by Kim Young</p>
                    <div class="flex items-center space-x-4 mt-4 text-[12px] font-bold">
                        <span class="text-indigo-500"><i class="fa-solid fa-heart mr-1"></i> 12K</span>
                        <span class="text-gray-400"><i class="fa-solid fa-eye mr-1"></i> 400K</span>
                    </div>
                </div>
            </div>

            <script>
                // Dynamically generate 7 more items to show scrolling
                const list = [
                    { title: "Midnight Sun", author: "Meyer", views: "320K", likes: "9K", rank: 4 },
                    { title: "Silent Voices", author: "H. Cobb", views: "210K", likes: "7.5K", rank: 5 },
                    { title: "The Last Code", author: "C. Martin", views: "190K", likes: "6K", rank: 6 },
                    { title: "Beyond The Horizon", author: "A. Ray", views: "150K", likes: "5K", rank: 7 },
                    { title: "Dark Nebula", author: "X. Zhao", views: "120K", likes: "4.8K", rank: 8 },
                    { title: "Kingdom of Ashes", author: "J. Doe", views: "90K", likes: "3K", rank: 9 },
                    { title: "Electric Dreams", author: "P. K. Dick", views: "80K", likes: "2.5K", rank: 10 },
                ];
                
                list.forEach(item => {
                    document.write(`
                        <div class="book-card bg-white p-4 rounded-3xl border border-gray-50 flex items-center space-x-4 cursor-pointer">
                            <div class="w-10 flex justify-center text-gray-300 font-black italic text-xl">${item.rank}</div>
                            <div class="w-16 h-24 bg-gray-50 rounded-lg overflow-hidden shrink-0 border border-gray-100">
                                <img src="https://via.placeholder.com/150x220?text=Book" class="w-full h-full object-cover opacity-60">
                            </div>
                            <div class="flex-1">
                                <h3 class="font-bold text-[15px] text-gray-900">${item.title}</h3>
                                <p class="text-xs font-medium text-gray-400">by ${item.author}</p>
                                <div class="flex items-center space-x-3 mt-2">
                                    <span class="text-[11px] font-bold text-gray-400"><i class="fa-solid fa-eye mr-1"></i> ${item.views}</span>
                                    <span class="text-[11px] font-bold text-gray-400"><i class="fa-solid fa-heart mr-1"></i> ${item.likes}</span>
                                </div>
                            </div>
                            <button class="px-4 py-2 bg-indigo-50 text-indigo-600 rounded-xl text-xs font-bold hover:bg-indigo-600 hover:text-white transition-all">Read</button>
                        </div>
                    `);
                });
            </script>

        </div>

        <div class="mt-12 text-center pb-10">
            <div class="inline-block w-8 h-8 border-4 border-indigo-100 border-t-indigo-500 rounded-full animate-spin"></div>
            <p class="text-sm text-gray-400 mt-4 font-medium">Looking for more stories...</p>
        </div>
        
    </main>

    <footer class="fixed bottom-0 left-0 right-0 bg-white/90 premium-blur border-t border-gray-100 py-3 z-[150]">
        <div class="flex justify-around items-center max-w-lg mx-auto">
            <a href="index.html" class="flex flex-col items-center text-gray-400 hover:text-indigo-500 transition-colors">
                <i class="fa-solid fa-heart text-xl"></i>
                <span class="text-[10px] mt-1 font-bold">For You</span>
            </a>
            <a href="fast.html" class="flex flex-col items-center text-gray-400">
                <i class="fa-solid fa-circle-play text-xl"></i>
                <span class="text-[10px] mt-1 font-bold">Fast</span>
            </a>
            <a href="discover.html" class="flex flex-col items-center text-indigo-600">
                <i class="fa-solid fa-compass text-xl"></i>
                <span class="text-[10px] mt-1 font-bold">Discover</span>
            </a>
            <a href="library.html" class="flex flex-col items-center text-gray-400">
                <i class="fa-solid fa-book text-xl"></i>
                <span class="text-[10px] mt-1 font-bold">Library</span>
            </a>
            <a href="me.html" class="flex flex-col items-center text-gray-400">
                <i class="fa-solid fa-face-smile text-xl"></i>
                <span class="text-[10px] mt-1 font-bold">MINE</span>
            </a>
        </div>
    </footer>

</body>
</html>
