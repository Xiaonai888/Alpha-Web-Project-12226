<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shadow - Search Discovery</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Kantumruy+Pro:wght@400;600;700&display=swap');
        
        :root { --shadow-primary: #6366f1; }
        body { font-family: 'Plus Jakarta Sans', 'Kantumruy Pro', sans-serif; background-color: #f8fafc; color: #1e293b; }
        .premium-blur { backdrop-filter: blur(10px); background-color: rgba(255, 255, 255, 0.8); }
        .book-card { transition: all 0.3s ease; }
        .book-card:hover { transform: translateY(-4px); box-shadow: 0 12px 24px -8px rgba(0, 0, 0, 0.1); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        .tab-btn { position: relative; transition: all 0.2s; }
        .tab-btn.active { color: var(--shadow-primary); font-weight: 800; }
        .tab-btn.active::after {
            content: ""; position: absolute; bottom: -2px; left: 0; width: 100%; height: 3px;
            background: var(--shadow-primary); border-radius: 10px;
        }

        .rank-1 { background: linear-gradient(135deg, #fbbf24, #f59e0b); }
        .rank-2 { background: linear-gradient(135deg, #94a3b8, #64748b); }
        .rank-3 { background: linear-gradient(135deg, #d97706, #b45309); }
    </style>
</head>
<body class="pb-20">

    <header class="sticky top-0 z-[100] premium-blur border-b border-gray-100 px-4 py-4">
        <div class="max-w-3xl mx-auto flex items-center space-x-4">
            <button class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-gray-100"><i class="fa-solid fa-chevron-left"></i></button>
            <div class="relative flex-1">
                <i class="fa-solid fa-magnifying-glass absolute left-4 top-1/2 -translate-y-1/2 text-gray-400"></i>
                <input type="text" placeholder="Search books, authors..." class="w-full bg-white border border-gray-200 py-3 pl-11 pr-4 rounded-2xl outline-none focus:border-indigo-400 shadow-sm">
            </div>
        </div>
    </header>

    <main class="max-w-3xl mx-auto px-4 mt-8">
        <nav class="flex space-x-8 border-b border-gray-100 mb-8 overflow-x-auto no-scrollbar">
            <button onclick="switchTab('trending', this)" class="tab-btn active pb-3 text-sm font-semibold text-gray-400 whitespace-nowrap">Trending Now</button>
            <button onclick="switchTab('popular', this)" class="tab-btn pb-3 text-sm font-semibold text-gray-400 whitespace-nowrap">Popular</button>
            <button onclick="switchTab('new', this)" class="tab-btn pb-3 text-sm font-semibold text-gray-400 whitespace-nowrap">New Releases</button>
            <button onclick="switchTab('recommended', this)" class="tab-btn pb-3 text-sm font-semibold text-gray-400 whitespace-nowrap">Recommended</button>
        </nav>

        <div class="flex items-center space-x-3 mb-6">
            <div class="w-1.5 h-6 bg-indigo-600 rounded-full"></div>
            <h2 id="section-title" class="text-xl font-extrabold text-gray-900">Readers Are Loving</h2>
        </div>

        <div id="book-container" class="space-y-4">
            </div>
    </main>

    <script>
        const bookData = {
            trending: [
                { title: "The Shadow's Legacy", author: "Jonathan Wick", views: "1.2M", likes: "24.5K", rating: "4.9", img: "shadow" },
                { title: "Mind Games", author: "Sarah Drasner", views: "850K", likes: "18K", rating: "4.7", img: "psych" },
                { title: "Reaper of Soul", author: "Kim Young", views: "400K", likes: "12K", rating: "4.5", img: "soul" },
                { title: "Midnight Sun", author: "Meyer", views: "320K", likes: "9K", rank: 4 }
            ],
            popular: [
                { title: "The Last Code", author: "C. Martin", views: "2.5M", likes: "50K", rating: "5.0", img: "code" },
                { title: "Electric Dreams", author: "P. K. Dick", views: "1.8M", likes: "35K", rating: "4.8", img: "electric" }
            ],
            new: [
                { title: "Dark Nebula", author: "X. Zhao", views: "50K", likes: "2K", rating: "4.2", img: "nebula" },
                { title: "Silent Voices", author: "H. Cobb", views: "30K", likes: "1.5K", rating: "4.0", img: "voice" }
            ],
            recommended: [
                { title: "Beyond Horizon", author: "A. Ray", views: "900K", likes: "20K", rating: "4.9", img: "horizon" }
            ]
        };

        function renderBooks(category) {
            const container = document.getElementById('book-container');
            const title = document.getElementById('section-title');
            const data = bookData[category];
            
            // Update Title
            const titles = { trending: "Readers Are Loving", popular: "Most Popular", new: "Just Arrived", recommended: "Handpicked For You" };
            title.innerText = titles[category];

            container.innerHTML = data.map((book, index) => {
                const rank = index + 1;
                const rankClass = rank <= 3 ? `rank-${rank}` : '';
                const rankBadge = rank <= 3 
                    ? `<div class="${rankClass} absolute top-0 left-0 w-10 h-10 flex items-center justify-center rounded-br-2xl text-white font-black italic shadow-md">${rank}</div>`
                    : `<div class="w-10 flex justify-center text-gray-300 font-black italic text-xl">${rank}</div>`;

                return `
                    <div class="book-card bg-white p-4 rounded-3xl border border-gray-50 flex items-center space-x-4 cursor-pointer relative overflow-hidden">
                        ${rankBadge}
                        <div class="w-20 h-28 bg-gray-100 rounded-xl overflow-hidden shrink-0 shadow-sm ${rank <= 3 ? 'ml-4' : ''}">
                            <img src="https://via.placeholder.com/200x300?text=Book" class="w-full h-full object-cover">
                        </div>
                        <div class="flex-1">
                            <h3 class="font-extrabold text-[16px] text-gray-900 leading-tight">${book.title}</h3>
                            <p class="text-sm font-medium text-gray-400">by ${book.author}</p>
                            <div class="flex items-center space-x-4 mt-4 text-[12px] font-bold">
                                <span class="text-indigo-500"><i class="fa-solid fa-heart mr-1"></i> ${book.likes}</span>
                                <span class="text-gray-400"><i class="fa-solid fa-eye mr-1"></i> ${book.views}</span>
                                ${book.rating ? `<span class="text-amber-500 bg-amber-50 px-2 py-0.5 rounded-lg"><i class="fa-solid fa-star mr-1"></i> ${book.rating}</span>` : ''}
                            </div>
                        </div>
                        ${rank > 3 ? `<button class="px-4 py-2 bg-indigo-50 text-indigo-600 rounded-xl text-xs font-bold hover:bg-indigo-600 hover:text-white transition-all">Read</button>` : ''}
                    </div>
                `;
            }).join('');
        }

        function switchTab(category, btn) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            renderBooks(category);
        }

        // Initial Load
        renderBooks('trending');
    </script>
</body>
</html>
