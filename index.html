<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shadow - For You</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/swiper/swiper-bundle.min.css" />
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #fff; overflow-x: hidden; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        /* Swiper Custom Style */
        .swiper-container {
            width: 100%;
            padding-top: 10px;
            padding-bottom: 30px;
        }
        .swiper-slide {
            width: 85%; 
            border-radius: 16px; 
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            transition: all 0.3s ease;
        }
        .swiper-slide-next, .swiper-slide-prev {
            opacity: 0.4;
            transform: scale(0.9);
        }
        .swiper-pagination-bullet-active {
            background: #3b82f6;
            width: 20px;
            border-radius: 5px;
        }
    </style>
</head>
<body class="pb-24">

    <footer class="fixed bottom-0 w-full bg-white border-t border-gray-100 flex justify-around py-3 z-50 shadow-lg">
        <div class="text-center text-blue-500 cursor-pointer">
            <i class="fas fa-heart"></i>
            <p class="text-[10px] font-medium">For You</p>
        </div>
        <div class="text-center text-gray-400 hover:text-gray-600 transition-colors cursor-pointer">
            <i class="fas fa-play-circle"></i>

        <div class="text-center text-gray-400 hover:text-gray-600 transition-colors cursor-pointer">

        </div>

    <script src="https://unpkg.com/swiper/swiper-bundle.min.js"></script>
    <script>
        var swiper = new Swiper(".mySwiper", {
            effect: "coverflow",
            grabCursor: true,
            centeredSlides: true,
            slidesPerView: "auto",
            coverflowEffect: {
                rotate: 0,
                stretch: 0,
                depth: 80,
                modifier: 2,
                slideShadows: false,
            },
            loop: true,
            autoplay: {
                delay: 4500,
                disableOnInteraction: false,
            },
            pagination: {
                el: ".swiper-pagination",
                clickable: true,
            },
        });
    </script>

</html>
