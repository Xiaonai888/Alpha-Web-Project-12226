<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Shadow - For You</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <link rel="stylesheet" href="https://unpkg.com/swiper/swiper-bundle.min.css" />
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Kantumruy+Pro:wght@400;600;700&family=Inter:wght@400;600;700&display=swap');

        html, body {
            margin: 0;
            padding: 0;
            min-height: 100%;
            overflow-x: hidden;
            background: #fff;
        }

        body {
            font-family: 'Kantumruy Pro', 'Inter', sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        .page-shell {
            min-height: 100vh;
            background: #fff;
        }

        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }

        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        .swiper-container {
            width: 100%;
            padding-top: 10px;
            padding-bottom: 30px;
        }

        .swiper-slide {
            width: 85%;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            transition: all 0.3s ease;
        }

        .swiper-slide-next, .swiper-slide-prev {
            opacity: 0.4;
            transform: scale(0.9);
        }

        .swiper-pagination-bullet-active {
            background: #3b82f6;
            width: 20px;
            border-radius: 5px;
        }

        .tab-item {
            transition: all 0.3s ease;
            cursor: pointer;
            position: relative;
        }

        .tab-item.active {
            color: #3b82f6;
            font-weight: 700;
        }

        .tab-item.active::after {
            content: '';
            position: absolute;
            bottom: -12px;
            left: 0;
            width: 100%;
            height: 3px;
            background: #3b82f6;
            border-radius: 10px;
        }

        .category-btn {
            transition: all 0.2s ease;
        }

        @media (min-width: 768px) {
            .swiper-slide {
                width: 58%;
            }
        }
    </style>
</head>
<body>

    <script src="https://unpkg.com/swiper/swiper-bundle.min.js"></script>
    <script>
        // --- 1. Tab Switching Controller ---
        function switchTab(type) {
            const tabs = ['novel', 'chat', 'manga'];
            tabs.forEach(tab => {
                const el = document.getElementById('tab-' + tab);
                if (tab === type) {
                    el.classList.add('active', 'text-blue-600');
                    el.classList.remove('text-gray-400');
                } else {
                    el.classList.remove('active', 'text-blue-600');
                    el.classList.add('text-gray-400');
                }
            });
            console.log("Active Tab: " + type);
        }

        // --- 2. Swiper Initializer ---
        var swiper = new Swiper('.mySwiper', {
            effect: 'coverflow',
            grabCursor: true,
            centeredSlides: true,
            slidesPerView: 'auto',
            coverflowEffect: {
                rotate: 0,
                stretch: 0,
                depth: 80,
                modifier: 2,
                slideShadows: false,
            },
            loop: true,
            autoplay: {
                delay: 4500,
                disableOnInteraction: false,
            },
            pagination: {
                el: '.swiper-pagination',
                clickable: true,
            },
        });
    </script>
<div id="spotlight-root"></div>
