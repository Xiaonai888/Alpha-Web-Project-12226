<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Shadow - For You</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
    <link rel="stylesheet" href="https://unpkg.com/swiper/swiper-bundle.min.css" />
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Kantumruy+Pro:wght@400;600;700&family=Inter:wght@400;600;700&display=swap');

        html, body {
            margin: 0;
            padding: 0;
            min-height: 100%;
            overflow-x: hidden;
            background: #fff;
        }

        body {
            font-family: 'Kantumruy Pro', 'Inter', sans-serif;
            -webkit-font-smoothing: antialiased;
            padding-bottom: calc(84px + env(safe-area-inset-bottom, 0px));
        }

        .page-shell {
            min-height: 100vh;
            background: #fff;
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        .swiper-container {
            width: 100%;
            padding-top: 10px;
            padding-bottom: 30px;
        }

        .swiper-slide {
            width: 85%;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            transition: all 0.3s ease;
        }

        .swiper-slide-next, .swiper-slide-prev {
            opacity: 0.4;
            transform: scale(0.9);
        }

        .swiper-pagination-bullet-active {
            background: #3b82f6;
            width: 20px;
            border-radius: 5px;
        }

        .tab-item { transition: all 0.3s ease; }
        .tab-item:hover { color: #3b82f6; transform: translateY(-1px); }

        .category-btn { transition: all 0.2s ease; }
        .category-btn:hover {
            transform: scale(1.05);
            background-color: #eff6ff;
            color: #3b82f6;
            border-color: #3b82f6;
        }

        .mobile-footer {
            position: fixed;
            left: 0;
            right: 0;
            bottom: 0;
            width: 100%;
            background: rgba(255, 255, 255, 0.96);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            border-top: 1px solid #f1f5f9;
            box-shadow: 0 -5px 15px rgba(0, 0, 0, 0.05);
            z-index: 9999;
            padding-top: 10px;
            padding-bottom: calc(10px + env(safe-area-inset-bottom, 0px));
        }

        .footer-link {
            min-width: 0;
        }

        .footer-link i,
        .footer-link p {
            display: block;
            line-height: 1.1;
        }

        @media (min-width: 768px) {
            .swiper-slide { width: 58%; }
        }
    </style>
</head>
<body>
    <div class="page-shell">
        <header class="flex justify-between items-center px-4 py-4 sticky top-0 bg-white z-50 shadow-sm">
            <div class="flex items-center space-x-2">
                <div class="w-9 h-9 bg-blue-600 rounded-full flex items-center justify-center text-white font-bold shadow-lg shadow-blue-200">S</div>
                <h1 class="text-blue-600 font-bold text-2xl tracking-tight">Shadow</h1>
            </div>
            <div class="flex space-x-5 text-gray-400 text-xl">
                <a href="search.html" class="hover:text-blue-600 transition-colors"><i class="fas fa-search"></i></a>
                <button type="button" class="hover:text-blue-600 transition-colors" aria-label="Notifications"><i class="fas fa-bell"></i></button>
            </div>
        </header>

        <nav class="flex px-4 space-x-8 border-b border-gray-100 bg-white">
            <button class="tab-item pb-3 border-b-2 border-blue-600 text-blue-600 font-bold text-sm">Novel</button>
            <button class="tab-item pb-3 text-gray-400 font-semibold text-sm">Chat Story</button>
            <button class="tab-item pb-3 text-gray-400 font-semibold text-sm">Manga</button>
        </nav>

        <div class="flex space-x-3 px-4 py-5 overflow-x-auto no-scrollbar bg-white">
            <button class="category-btn bg-blue-600 text-white px-6 py-1.5 rounded-full text-xs shrink-0 font-bold shadow-md shadow-blue-100">Today</button>
            <button class="category-btn border border-gray-200 px-5 py-1.5 rounded-full text-xs shrink-0 text-gray-600 font-semibold">Romance</button>
            <button class="category-btn border border-gray-200 px-5 py-1.5 rounded-full text-xs shrink-0 text-gray-600 font-semibold">Fantasy</button>
            <button class="category-btn border border-gray-200 px-5 py-1.5 rounded-full text-xs shrink-0 text-gray-600 font-semibold">Action</button>
            <button class="category-btn border border-gray-200 px-5 py-1.5 rounded-full text-xs shrink-0 text-gray-600 font-semibold">BL</button>
            <button class="category-btn border border-gray-200 px-5 py-1.5 rounded-full text-xs shrink-0 text-gray-600 font-semibold">GL</button>
            <button class="category-btn border border-gray-200 px-5 py-1.5 rounded-full text-xs shrink-0 text-gray-600 font-semibold">System</button>
            <button class="category-btn border border-gray-200 px-5 py-1.5 rounded-full text-xs shrink-0 text-gray-600 font-semibold">School Love</button>
        </div>

        <div class="swiper-container mySwiper">
            <div class="swiper-wrapper">
                <div class="swiper-slide aspect-[16/9]"><img src="assets/banners/K26.jpg" class="w-full h-full object-cover" alt="Banner 1"></div>
                <div class="swiper-slide aspect-[16/9]"><img src="assets/banners/K27.jpg" class="w-full h-full object-cover" alt="Banner 2"></div>
                <div class="swiper-slide aspect-[16/9]"><img src="assets/banners/K28.jpg" class="w-full h-full object-cover" alt="Banner 3"></div>
                <div class="swiper-slide aspect-[16/9]"><img src="assets/banners/K29.jpg" class="w-full h-full object-cover" alt="Banner 4"></div>
                <div class="swiper-slide aspect-[16/9]"><img src="assets/banners/K30.jpg" class="w-full h-full object-cover" alt="Banner 5"></div>
                <div class="swiper-slide aspect-[16/9]"><img src="assets/banners/K31.jpg" class="w-full h-full object-cover" alt="Banner 6"></div>
                <div class="swiper-slide aspect-[16/9]"><img src="assets/banners/K32.jpg" class="w-full h-full object-cover" alt="Banner 7"></div>
            </div>
            <div class="swiper-pagination"></div>
        </div>

        <div class="grid grid-cols-4 gap-4 py-4 px-4 text-center">
            <div class="group cursor-pointer">
                <div class="w-12 h-12 bg-gray-50 rounded-full mb-1 mx-auto flex items-center justify-center group-hover:bg-blue-50 transition-all">
                    <i class="fas fa-shopping-bag text-gray-500 group-hover:text-blue-600"></i>
                </div>
                <span class="text-[10px] text-gray-500 font-semibold">Shop</span>
            </div>
            <div class="group cursor-pointer">
                <div class="w-12 h-12 bg-gray-50 rounded-full mb-1 mx-auto flex items-center justify-center group-hover:bg-blue-50 transition-all">
                    <i class="fas fa-tasks text-gray-500 group-hover:text-blue-600"></i>
                </div>
                <span class="text-[10px] text-gray-500 font-semibold">Tasks</span>
            </div>
            <div class="group cursor-pointer">
                <div class="w-12 h-12 bg-gray-50 rounded-full mb-1 mx-auto flex items-center justify-center group-hover:bg-blue-50 transition-all">
                    <i class="fas fa-trophy text-gray-500 group-hover:text-blue-600"></i>
                </div>
                <span class="text-[10px] text-gray-500 font-semibold">Ranking</span>
            </div>
            <div class="group cursor-pointer">
                <div class="w-12 h-12 bg-gray-50 rounded-full mb-1 mx-auto flex items-center justify-center group-hover:bg-blue-50 transition-all">
                    <i class="fas fa-calendar text-gray-500 group-hover:text-blue-600"></i>
                </div>
                <span class="text-[10px] text-gray-500 font-semibold">Event</span>
            </div>
        </div>

        <div class="px-4 py-8">
            <h3 class="font-bold text-gray-800 mb-5 text-lg">Alpha Spotlight</h3>
            <div class="flex space-x-5 overflow-x-auto no-scrollbar pb-3">
                <a href="fast.html" class="min-w-[80%] md:min-w-[350px] aspect-[16/10] bg-gray-100 rounded-2xl overflow-hidden relative group cursor-pointer border border-gray-100 shadow-sm hover:shadow-xl transition-all">
                    <img src="https://via.placeholder.com/800x500?text=Spotlight+1" class="w-full h-full object-cover transition-transform duration-700 group-hover:scale-110" alt="Spotlight 1">
                    <div class="absolute inset-0 bg-gradient-to-t from-black/80 via-black/10 to-transparent"></div>
                    <div class="absolute bottom-4 left-4 text-white">
                        <div class="flex items-center space-x-2 mb-1.5">
                            <span class="bg-blue-600 text-[10px] font-bold px-2.5 py-1 rounded-full">FANTASY</span>
                            <span class="text-[11px] font-medium opacity-90">EP 125</span>
                        </div>
                        <h4 class="font-bold text-lg leading-tight truncate">The Last Sovereign</h4>
                    </div>
                </a>
                <a href="fast.html" class="min-w-[80%] md:min-w-[350px] aspect-[16/10] bg-gray-100 rounded-2xl overflow-hidden relative group cursor-pointer border border-gray-100 shadow-sm hover:shadow-xl transition-all">
                    <img src="https://via.placeholder.com/800x500?text=Spotlight+2" class="w-full h-full object-cover transition-transform duration-700 group-hover:scale-110" alt="Spotlight 2">
                    <div class="absolute inset-0 bg-gradient-to-t from-black/80 via-black/10 to-transparent"></div>
                    <div class="absolute bottom-4 left-4 text-white">
                        <div class="flex items-center space-x-2 mb-1.5">
                            <span class="bg-orange-500 text-[10px] font-bold px-2.5 py-1 rounded-full">ROMANCE</span>
                            <span class="text-[11px] font-medium opacity-90">EP 45</span>
                        </div>
                        <h4 class="font-bold text-lg leading-tight truncate">Love Beyond Stars</h4>
                    </div>
                </a>
            </div>
        </div>

        <div class="px-4 mb-16">
            <div class="flex justify-between items-center mb-6">
                <h3 class="font-bold text-gray-800 text-lg flex items-center">
                    <img src="https://img.icons8.com/emoji/48/star-emoji.png" class="w-5 h-5 mr-2" alt="Star"> Must Reads
                </h3>
                <button class="text-blue-600 text-xs font-bold">See All</button>
            </div>

            <div class="grid grid-cols-2 md:grid-cols-6 gap-x-4 gap-y-8 text-left">
                <a href="fast.html" class="group cursor-pointer">
                    <div class="aspect-[1.4/1] bg-gray-100 rounded-xl overflow-hidden shadow-sm border border-gray-50 mb-3">
                        <img src="https://via.placeholder.com/600x400?text=Book+1" class="w-full h-full object-cover transition-transform duration-500 group-hover:scale-110" alt="Book 1">
                    </div>
                    <h4 class="font-bold text-sm text-gray-900 mb-1 truncate group-hover:text-blue-600 transition-colors">Shadow Bride</h4>
                    <div class="flex items-center space-x-2">
                        <span class="bg-yellow-100 text-yellow-700 text-[9px] font-bold px-2 py-0.5 rounded uppercase">Fantasy</span>
                        <span class="text-[10px] text-gray-500 font-medium tracking-wide">EP 20</span>
                    </div>
                </a>
            </div>
        </div>
    </div>

    <footer class="mobile-footer">
        <div class="grid grid-cols-5 items-center text-center px-2">
            <a href="index.html" class="footer-link text-blue-600 group flex flex-col items-center justify-center">
                <i class="fas fa-heart text-lg mb-0.5 transition-transform group-hover:scale-110"></i>
                <p class="text-[10px] font-bold">For You</p>
            </a>

            <a href="fast.html" class="footer-link text-gray-400 hover:text-blue-600 group flex flex-col items-center justify-center transition-all">
                <i class="fas fa-play-circle text-xl mb-0.5 transition-transform group-hover:scale-110"></i>
                <p class="text-[10px] font-semibold">Fast</p>
            </a>

            <a href="discover.html" class="footer-link text-gray-400 hover:text-blue-600 group flex flex-col items-center justify-center transition-all cursor-pointer">
                <i class="fas fa-compass text-lg mb-0.5 transition-transform group-hover:scale-110"></i>
                <p class="text-[10px] font-semibold">Discover</p>
            </a>

            <a href="library.html" class="footer-link text-gray-400 hover:text-blue-600 group flex flex-col items-center justify-center transition-all cursor-pointer">
                <i class="fas fa-book text-lg mb-0.5 transition-transform group-hover:scale-110"></i>
                <p class="text-[10px] font-semibold">Library</p>
            </a>

            <a href="me.html" class="footer-link text-gray-400 hover:text-blue-600 group flex flex-col items-center justify-center transition-all cursor-pointer">
                <i class="fas fa-smile text-lg mb-0.5 transition-transform group-hover:scale-110"></i>
                <p class="text-[10px] font-semibold uppercase">Mine</p>
            </a>
        </div>
    </footer>

    <script src="https://unpkg.com/swiper/swiper-bundle.min.js"></script>
    <script>
        var swiper = new Swiper('.mySwiper', {
            effect: 'coverflow',
            grabCursor: true,
            centeredSlides: true,
            slidesPerView: 'auto',
            coverflowEffect: {
                rotate: 0,
                stretch: 0,
                depth: 80,
                modifier: 2,
                slideShadows: false,
            },
            loop: true,
            autoplay: {
                delay: 4500,
                disableOnInteraction: false,
            },
            pagination: {
                el: '.swiper-pagination',
                clickable: true,
            },
        });
    </script>
</body>
</html>
