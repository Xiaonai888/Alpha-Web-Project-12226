<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shadow - For You</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/swiper/swiper-bundle.min.css" />
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Kantumruy+Pro:wght@400;600;700&display=swap');
        
        body { 
            font-family: 'Kantumruy Pro', sans-serif; 
            background-color: #fff; 
            overflow-x: hidden;
        }
        
        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        /* រក្សារចនាប័ទ្ម Swiper ដើមរបស់អ្នក */
        .swiper-container { width: 100%; padding-top: 10px; padding-bottom: 30px; }
        .swiper-slide { 
            width: 85%; 
            border-radius: 20px; 
            overflow: hidden; 
            box-shadow: 0 10px 20px rgba(0,0,0,0.1); 
        }
    </style>
</head>
<body class="pb-28">

    <header class="flex justify-between items-center px-4 py-4 sticky top-0 bg-white z-50 shadow-sm">
        <div class="flex items-center space-x-2">
            <div class="w-9 h-9 bg-blue-600 rounded-full flex items-center justify-center text-white font-bold shadow-lg">S</div>
            <h1 class="text-blue-600 font-bold text-2xl tracking-tight">Shadow</h1>
        </div>
        <div class="flex space-x-5 text-gray-400 text-xl">
            <i class="fas fa-search cursor-pointer"></i>
            <i class="fas fa-bell cursor-pointer"></i>
        </div>
    </header>

    <div class="swiper-container mySwiper">
        <div class="swiper-wrapper">
            <div class="swiper-slide aspect-[16/9]"><img src="assets/banners/K26.jpg" class="w-full h-full object-cover"></div>
            <div class="swiper-slide aspect-[16/9]"><img src="assets/banners/K27.jpg" class="w-full h-full object-cover"></div>
            <div class="swiper-slide aspect-[16/9]"><img src="assets/banners/K28.jpg" class="w-full h-full object-cover"></div>
            <div class="swiper-slide aspect-[16/9]"><img src="assets/banners/K29.jpg" class="w-full h-full object-cover"></div>
            <div class="swiper-slide aspect-[16/9]"><img src="assets/banners/K30.jpg" class="w-full h-full object-cover"></div>
            <div class="swiper-slide aspect-[16/9]"><img src="assets/banners/K31.jpg" class="w-full h-full object-cover"></div>
            <div class="swiper-slide aspect-[16/9]"><img src="assets/banners/K32.jpg" class="w-full h-full object-cover"></div>
        </div>
        <div class="swiper-pagination"></div>
    </div>

    <div class="flex space-x-3 px-4 py-2 overflow-x-auto no-scrollbar mb-6">
        <button class="bg-blue-600 text-white px-5 py-1.5 rounded-full text-xs font-bold shrink-0">Today</button>
        <button class="border border-gray-200 px-5 py-1.5 rounded-full text-xs font-semibold text-gray-600 shrink-0">Romance</button>
        <button class="border border-gray-200 px-5 py-1.5 rounded-full text-xs font-semibold text-gray-600 shrink-0">Action</button>
        <button class="border border-gray-200 px-5 py-1.5 rounded-full text-xs font-semibold text-gray-600 shrink-0">Fantasy</button>
    </div>

    <div class="px-4 mb-10">
        <h3 class="font-bold text-gray-800 text-lg mb-5">Must Reads</h3>
        <div class="grid grid-cols-2 gap-4">
            <div class="group cursor-pointer">
                <div class="aspect-[3/4] bg-gray-100 rounded-xl overflow-hidden mb-2 shadow-sm">
                    <img src="assets/fast/your_book_1.jpg" class="w-full h-full object-cover" onerror="this.src='https://via.placeholder.com/300x400?text=Novel+1'">
                </div>
                <h4 class="font-bold text-sm text-gray-900 truncate">Shadow Bride</h4>
                <p class="text-[10px] text-gray-500">Fantasy • EP 20</p>
            </div>
            <div class="group cursor-pointer">
                <div class="aspect-[3/4] bg-gray-100 rounded-xl overflow-hidden mb-2 shadow-sm">
                    <img src="assets/fast/your_book_2.jpg" class="w-full h-full object-cover" onerror="this.src='https://via.placeholder.com/300x400?text=Novel+2'">
                </div>
                <h4 class="font-bold text-sm text-gray-900 truncate">The Last Echo</h4>
                <p class="text-[10px] text-gray-500">Drama • EP 45</p>
            </div>
        </div>
    </div>

    <footer class="fixed bottom-0 w-full bg-white border-t border-gray-100 flex justify-around py-3.5 z-[100] shadow-[0_-5px_15px_rgba(0,0,0,0.05)]">
        
        <a href="index.html" class="text-center text-blue-600 flex flex-col items-center">
            <i class="fas fa-heart text-[22px] mb-0.5"></i>
            <p class="text-[10px] font-bold">For You</p>
        </a>

        <a href="fast.html" class="text-center text-gray-400 hover:text-blue-600 flex flex-col items-center group transition-all">
            <i class="fas fa-play-circle text-[20px] mb-0.5 group-hover:scale-110 transition-transform"></i>
            <p class="text-[10px] font-semibold">Fast</p>
        </a>

        <a href="discover.html" class="text-center text-gray-400 hover:text-blue-600 flex flex-col items-center group transition-all">
            <i class="fas fa-compass text-[20px] mb-0.5 group-hover:scale-110 transition-transform"></i>
            <p class="text-[10px] font-semibold">Discover</p>
        </a>

        <div class="text-center text-gray-400 flex flex-col items-center cursor-pointer hover:text-blue-600 transition-all">
            <i class="fas fa-book text-[20px] mb-0.5"></i>
            <p class="text-[10px]">Library</p>
        </div>
        
        <div class="text-center text-gray-400 flex flex-col items-center cursor-pointer hover:text-blue-600 transition-all">
            <i class="fas fa-user text-[20px] mb-0.5"></i>
            <p class="text-[10px]">Me</p>
        </div>

    </footer>

    <script src="https://unpkg.com/swiper/swiper-bundle.min.js"></script>
    <script>
        var swiper = new Swiper(".mySwiper", {
            centeredSlides: true,
            slidesPerView: "auto",
            spaceBetween: 15,
            loop: true,
            autoplay: { delay: 3000, disableOnInteraction: false },
            pagination: { el: ".swiper-pagination", clickable: true }
        });
    </script>
</body>
</html>
