<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shadow Discover - Echo Your World</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Kantumruy+Pro:wght@400;600;700&family=Inter:wght@400;600;700&display=swap');
        
        body { 
            font-family: 'Kantumruy Pro', sans-serif; 
            background-color: #f0f2f5; 
            color: #1c1e21; 
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .feed-container { max-width: 580px; margin: 0 auto; }
        .post-card { background: white; margin-bottom: 12px; border-bottom: 1px solid #ddd; box-shadow: 0 1px 2px rgba(0,0,0,0.1); }
        @media (min-width: 640px) { .post-card { border-radius: 12px; border: 1px solid #ddd; } }

        /* Logic សម្រាប់ប្តូរ Tab */
        .tab-content { display: none; }
        .tab-content.active { display: block; }

        /* Slide / Banner Style */
        .banner-slide { width: 100%; aspect-ratio: 16 / 9; border-radius: 12px; object-fit: cover; }
        
        /* Genre Button Style */
        .genre-btn { padding: 6px 16px; border-radius: 20px; border: 1px solid #ddd; font-size: 12px; font-weight: 600; white-space: nowrap; transition: all 0.2s; }
        .genre-btn:hover { background: #1877f2; color: white; border-color: #1877f2; }

        /* Reaction Bar */
        .reaction-box { display: none; position: absolute; bottom: 55px; left: 10px; background: white; padding: 8px 12px; border-radius: 40px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); z-index: 500; gap: 12px; animation: reactionPop 0.25s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        @keyframes reactionPop { from { transform: translateY(20px) scale(0.5); opacity: 0; } to { transform: translateY(0) scale(1); opacity: 1; } }
        .reaction-icon { width: 42px; height: 42px; cursor: pointer; transition: transform 0.2s ease; }
        .reaction-icon:hover { transform: scale(1.45) translateY(-8px); }

        #commentPanel { position: fixed; bottom: 0; left: 0; width: 100%; height: 85vh; background: white; z-index: 1000; border-radius: 20px 20px 0 0; transform: translateY(100%); transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1); box-shadow: 0 -10px 40px rgba(0,0,0,0.2); }
        #commentPanel.active { transform: translateY(0); }
    </style>
</head>
<body class="pb-24">

    <header class="sticky top-0 z-[60] bg-white border-b border-gray-200 shadow-sm">
        <div class="px-4 py-2.5 flex justify-between items-center">
            <h1 class="text-blue-600 font-extrabold text-2xl italic tracking-tighter">Echo</h1>
            <div class="flex space-x-2.5">
                <button class="w-10 h-10 bg-gray-100 rounded-full flex items-center justify-center hover:bg-gray-200 transition-all"><i class="fas fa-plus text-gray-800"></i></button>
                <button class="w-10 h-10 bg-gray-100 rounded-full flex items-center justify-center hover:bg-gray-200 transition-all"><i class="fas fa-search text-gray-800"></i></button>
                <button class="w-10 h-10 bg-gray-100 rounded-full flex items-center justify-center text-blue-600 hover:bg-blue-50 transition-all"><i class="fab fa-facebook-messenger text-xl"></i></button>
            </div>
        </div>
    </header>

    <div class="feed-container">
        
        <div id="for-you-page" class="tab-content active">
            
            <div class="px-4 py-4">
                <div class="relative overflow-hidden rounded-2xl shadow-lg">
                    <img src="https://via.placeholder.com/800x450?text=Trending+Novel+Slide" class="banner-slide">
                    <div class="absolute bottom-4 left-4 text-white">
                        <span class="bg-blue-600 px-2 py-1 rounded text-[10px] font-bold">HOT RELEASE</span>
                        <h2 class="text-lg font-bold drop-shadow-md">ស្រមោលស្នេហ៍បិសាច</h2>
                    </div>
                </div>
            </div>

            <div class="flex space-x-2 px-4 pb-4 overflow-x-auto no-scrollbar">
                <button class="genre-btn bg-blue-600 text-white border-blue-600">ទាំងអស់</button>
                <button class="genre-btn">មនោសញ្ចេតនា</button>
                <button class="genre-btn">ភ័យរន្ធត់</button>
                <button class="genre-btn">បុរាណ</button>
                <button class="genre-btn">យុទ្ធសិល្ប៍</button>
            </div>

            <div class="px-4 mb-6">
                <div class="flex justify-between items-end mb-3">
                    <h3 class="font-bold text-gray-800">Must Read</h3>
                    <a href="#" class="text-blue-600 text-xs font-bold">មើលទាំងអស់</a>
                </div>
                <div class="flex space-x-4 overflow-x-auto no-scrollbar">
                    <div class="min-w-[120px]">
                        <img src="https://via.placeholder.com/120x180?text=Book+1" class="rounded-lg shadow-md mb-2">
                        <p class="text-xs font-bold line-clamp-1">សន្សើមផ្កាស្មៅ</p>
                        <p class="text-[10px] text-gray-500">ដោយ៖ You</p>
                    </div>
                    <div class="min-w-[120px]">
                        <img src="https://via.placeholder.com/120x180?text=Book+2" class="rounded-lg shadow-md mb-2">
                        <p class="text-xs font-bold line-clamp-1">ស្នេហ៍ក្នុងសុបិន</p>
                        <p class="text-[10px] text-gray-500">ដោយ៖ Dara</p>
                    </div>
                    <div class="min-w-[120px]">
                        <img src="https://via.placeholder.com/120x180?text=Book+3" class="rounded-lg shadow-md mb-2">
                        <p class="text-xs font-bold line-clamp-1">សមុទ្រទឹកភ្នែក</p>
                        <p class="text-[10px] text-gray-500">ដោយ៖ Lina</p>
                    </div>
                </div>
            </div>

            <article class="post-card">
                <div class="p-3.5 flex justify-between items-center">
                    <div class="flex items-center space-x-3">
                        <img src="https://via.placeholder.com/100" class="w-10 h-10 rounded-full">
                        <div><h4 class="font-bold text-[13px]">Sovan Dara</h4><p class="text-[10px] text-gray-500">3 hours ago</p></div>
                    </div>
                </div>
                <div class="px-3.5 pb-3.5 text-[13.5px]">រីករាយថ្ងៃចុងសប្តាហ៍ជាមួយមិត្តភក្តិ! ☕️</div>
                <img src="https://via.placeholder.com/800x800?text=Square+Photo" class="w-full aspect-square object-cover">
            </article>
        </div>

        <div id="fast-page" class="tab-content">
            <div class="p-4"><h2 class="font-bold text-lg">Fast Reels</h2></div>
            </div>

        <div id="discover-page" class="tab-content">
            <div class="p-4"><h2 class="font-bold text-lg">Discover New Stories</h2></div>
            </div>

    </div>

    <footer class="fixed bottom-0 w-full bg-white border-t border-gray-100 flex justify-around py-3.5 z-[200] shadow-[0_-5px_20px_rgba(0,0,0,0.05)]">
        <button onclick="switchTab('for-you-page', this)" class="nav-item text-center text-blue-600 flex flex-col items-center">
            <i class="fas fa-heart text-[20px] mb-0.5"></i>
            <p class="text-[10px] font-bold">For You</p>
        </button>
        <button onclick="switchTab('fast-page', this)" class="nav-item text-center text-gray-400 flex flex-col items-center">
            <i class="fas fa-play-circle text-[20px] mb-0.5"></i>
            <p class="text-[10px] font-semibold">Fast</p>
        </button>
        <button onclick="switchTab('discover-page', this)" class="nav-item text-center text-gray-400 flex flex-col items-center">
            <i class="fas fa-compass text-[22px] mb-0.5"></i>
            <p class="text-[10px] font-semibold">Discover</p>
        </button>
        <div class="text-center text-gray-400 flex flex-col items-center"><i class="fas fa-book text-[20px] mb-0.5"></i><p class="text-[10px]">Library</p></div>
        <div class="text-center text-gray-400 flex flex-col items-center"><i class="fas fa-user text-[20px] mb-0.5"></i><p class="text-[10px]">Me</p></div>
    </footer>

    <script>
        function switchTab(pageId, element) {
            document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');

            document.querySelectorAll('.nav-item').forEach(item => {
                item.classList.remove('text-blue-600');
                item.classList.add('text-gray-400');
                item.querySelector('p').classList.remove('font-bold');
                item.querySelector('p').classList.add('font-semibold');
            });
            element.classList.add('text-blue-600');
            element.classList.remove('text-gray-400');
            element.querySelector('p').classList.add('font-bold');
            window.scrollTo(0, 0);
        }
    </script>
</body>
</html>
