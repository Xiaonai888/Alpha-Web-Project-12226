    <link rel="stylesheet" href="https://unpkg.com/swiper/swiper-bundle.min.css" />
    <style>
        /* ប្រើ Font Kantumruy Pro ឱ្យមើលទៅអាជីព */
        @import url('https://fonts.googleapis.com/css2?family=Kantumruy+Pro:wght@400;600;700&family=Inter:wght@400;600;700&display=swap');
        
        body { 
            font-family: 'Kantumruy Pro', 'Inter', sans-serif; 
            background-color: #fff; 
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }
        
        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        /* Swiper Style */
        .swiper-container { width: 100%; padding-top: 10px; padding-bottom: 30px; }
        .swiper-slide { 
            width: 85%; 
            border-radius: 20px; 
            overflow: hidden; 
            box-shadow: 0 10px 20px rgba(0,0,0,0.1); 
            transition: all 0.3s ease; 
        }
        .swiper-slide-next, .swiper-slide-prev { opacity: 0.4; transform: scale(0.9); }
        .swiper-pagination-bullet-active { background: #3b82f6; width: 20px; border-radius: 5px; }

        /* Animation សម្រាប់ Interactive Elements */
        .tab-item { transition: all 0.3s ease; }
        .tab-item:hover { color: #3b82f6; transform: translateY(-1px); }
        
        .category-btn { transition: all 0.2s ease; }
        .category-btn:hover { transform: scale(1.05); background-color: #eff6ff; color: #3b82f6; border-color: #3b82f6; }
    </style>
</head>

    <script>
        var swiper = new Swiper(".mySwiper", {
            effect: "coverflow",
            grabCursor: true,
            centeredSlides: true,
            slidesPerView: "auto",
            coverflowEffect: { rotate: 0, stretch: 0, depth: 80, modifier: 2, slideShadows: false },
            loop: true,
            autoplay: { delay: 4500, disableOnInteraction: false },
