<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shadow Discover - Echo Your World</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Kantumruy+Pro:wght@400;600;700&family=Inter:wght@400;600;700&display=swap');
        
        body { 
            font-family: 'Kantumruy Pro', sans-serif; 
            background-color: #f0f2f5; 
            color: #1c1e21; 
            overflow-x: hidden;
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        /* រូបភាព Post រាងការ៉េ ១:១ */
        .post-img-square { aspect-ratio: 1 / 1; object-fit: cover; width: 100%; }

        /* FB Reaction Bar Style */
        .reaction-box {
            display: none;
            position: absolute;
            bottom: 50px;
            left: 10px;
            background: white;
            padding: 8px 12px;
            border-radius: 40px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.15);
            z-index: 200;
            gap: 10px;
            animation: popUp 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        @keyframes popUp {
            from { transform: translateY(20px) scale(0.5); opacity: 0; }
            to { transform: translateY(0) scale(1); opacity: 1; }
        }
        .reaction-icon { width: 38px; height: 38px; cursor: pointer; transition: transform 0.2s; }
        .reaction-icon:hover { transform: scale(1.4) translateY(-5px); }

        /* Active Colors */
        .echo-active { color: #10b981 !important; font-weight: bold; }
        .post-card { background: white; margin-bottom: 10px; border-bottom: 1px solid #ddd; }
        @media (min-width: 640px) { .post-card { border-radius: 12px; border: 1px solid #ddd; } }
    </style>
</head>
<body class="pb-24">

    <header class="sticky top-0 z-50 bg-white border-b border-gray-200 px-4 py-2 flex justify-between items-center shadow-sm">
        <h1 class="text-blue-600 font-extrabold text-2xl italic tracking-tighter">Echo</h1>
        <div class="flex space-x-2">
            <button class="w-10 h-10 bg-gray-100 rounded-full flex items-center justify-center hover:bg-gray-200 transition-colors">
                <i class="fas fa-search text-gray-700"></i>
            </button>
            <button class="w-10 h-10 bg-gray-100 rounded-full flex items-center justify-center text-blue-600 hover:bg-gray-200 transition-colors">
                <i class="fab fa-facebook-messenger text-xl"></i>
            </button>
        </div>
    </header>

    <div class="max-w-[550px] mx-auto space-y-2.5 sm:pt-3">

        <div class="post-card p-4 shadow-sm">
            <div class="flex items-center space-x-3 mb-4">
                <div class="w-10 h-10 rounded-full bg-blue-500 flex items-center justify-center text-white font-bold border">U</div>
                <button class="flex-1 bg-gray-100 rounded-full py-2.5 px-5 text-left text-gray-500 text-sm hover:bg-gray-200 transition-all">តើអ្នកកំពុងគិតអ្វី?</button>
            </div>
            <div class="flex justify-around border-t pt-3 text-[11px] font-bold text-gray-600">
                <span class="cursor-pointer"><i class="fas fa-video text-red-500 mr-2"></i> Live</span>
                <span class="cursor-pointer"><i class="fas fa-images text-green-500 mr-2"></i> Photo</span>
                <span class="cursor-pointer"><i class="fas fa-laugh text-yellow-500 mr-2"></i> Feeling</span>
            </div>
        </div>

        <div class="post-card py-4 overflow-hidden border-b">
            <div class="flex space-x-2 px-4 overflow-x-auto no-scrollbar">
                <div class="min-w-[110px] h-44 bg-gray-50 rounded-xl relative overflow-hidden border border-gray-200 shrink-0">
                    <img src="https://via.placeholder.com/110x130?text=Me" class="w-full h-3/4 object-cover">
                    <div class="absolute bottom-0 w-full bg-white h-1/4 flex flex-col items-center">
                        <div class="absolute -top-4 w-8 h-8 bg-blue-600 rounded-full border-4 border-white flex items-center justify-center text-white"><i class="fas fa-plus text-xs"></i></div>
                        <span class="text-[9px] mt-4 font-bold">Create Story</span>
                    </div>
                </div>
                <div class="min-w-[110px] h-44 rounded-xl relative overflow-hidden shrink-0 shadow-sm">
                    <img src="https://via.placeholder.com/220x440?text=Sovan+Story" class="w-full h-full object-cover">
                    <div class="absolute top-2 left-2 w-9 h-9 rounded-full border-2 border-blue-600 p-0.5 overflow-hidden"><img src="https://via.placeholder.com/50"></div>
                </div>
            </div>
        </div>

        <div class="post-card shadow-sm">
            <div class="p-3 flex justify-between items-center">
                <div class="flex items-center space-x-3">
                    <img src="https://via.placeholder.com/100" class="w-10 h-10 rounded-full border">
                    <div><h4 class="font-bold text-sm">Sovan Dara</h4><p class="text-[10px] text-gray-500">2h • <i class="fas fa-user-friends"></i></p></div>
                </div>
                <i class="fas fa-ellipsis-h text-gray-400 p-2"></i>
            </div>
            <p class="px-3 pb-3 text-sm">ជួបគ្នាថ្ងៃសម្រាក! ☕️✨ #Weekend</p>
            <img src="https://via.placeholder.com/600x600?text=Friend+Square+Post" class="post-img-square cursor-pointer">
            
            <div class="px-3 py-2 flex justify-between items-center text-gray-500 text-[11px] border-b mx-2">
                <div class="flex items-center space-x-1"><i class="fas fa-heart text-red-500"></i><span>150 Likes</span></div>
                <div>24 Comments • 5 Echoes</div>
            </div>

            <div class="flex py-1 px-2 relative">
                <div class="reaction-box flex" id="reactionBar1">
                    <img src="https://img.icons8.com/color/48/thumbs-up.png" class="reaction-icon" onclick="setReaction(1, 'Like', '#1877f2')">
                    <img src="https://img.icons8.com/color/48/filled-like.png" class="reaction-icon" onclick="setReaction(1, 'Love', '#f33e58')">
                    <img src="https://img.icons8.com/color/48/grinning-face-with-smiling-eyes.png" class="reaction-icon" onclick="setReaction(1, 'Haha', '#f7b125')">
                    <img src="https://img.icons8.com/color/48/wow.png" class="reaction-icon" onclick="setReaction(1, 'Wow', '#f7b125')">
                    <img src="https://img.icons8.com/color/48/sad.png" class="reaction-icon" onclick="setReaction(1, 'Sad', '#f7b125')">
                    <img src="https://img.icons8.com/color/48/angry.png" class="reaction-icon" onclick="setReaction(1, 'Angry', '#e9710f')">
                </div>

                <button onmousedown="startTimer(1)" onmouseup="stopTimer()" id="likeBtn1" class="flex-1 flex items-center justify-center space-x-2 py-2 hover:bg-gray-100 rounded-md text-gray-600 transition-all">
                    <i class="far fa-thumbs-up"></i> <span class="text-xs font-bold">Like</span>
                </button>
                <button class="flex-1 flex items-center justify-center space-x-2 py-2 hover:bg-gray-100 rounded-md text-gray-600">
                    <i class="far fa-comment"></i> <span class="text-xs font-bold">Comment</span>
                </button>
                <button onclick="echoAction(this)" class="flex-1 flex items-center justify-center space-x-2 py-2 hover:bg-gray-100 rounded-md text-gray-600">
                    <i class="fas fa-share-square"></i> <span class="text-xs font-bold">Echo</span>
                </button>
            </div>
        </div>

        <div class="post-card">
            <div class="p-3 flex items-center space-x-3">
                <div class="w-10 h-10 rounded-full bg-blue-600 flex items-center justify-center text-white font-bold">S</div>
                <div><h4 class="font-bold text-sm">Shadow Official <i class="fas fa-check-circle text-blue-500 text-[10px]"></i></h4><p class="text-[10px] text-gray-500">Sponsored • <i class="fas fa-globe-americas"></i></p></div>
            </div>
            <img src="https://via.placeholder.com/600x600?text=Shadow+Book+Promo" class="post-img-square">
            <div class="p-3 flex justify-between items-center bg-gray-50">
                <div class="text-xs"><p class="font-bold">Shadow Novel App</p><p class="text-gray-500">Install Now</p></div>
                <button class="bg-gray-200 px-4 py-1.5 rounded text-xs font-bold">Get</button>
            </div>
        </div>

        <div class="post-card p-3">
            <div class="flex justify-between items-center mb-3"><h4 class="font-bold text-xs text-gray-500">Fast Reels</h4><i class="fas fa-times text-gray-300"></i></div>
            <div class="flex space-x-2 overflow-x-auto no-scrollbar">
                <div class="min-w-[140px] aspect-[9/16] bg-gray-900 rounded-xl relative overflow-hidden shadow-lg"><img src="https://via.placeholder.com/200x350?text=Fast+Video" class="w-full h-full object-cover opacity-80"><div class="absolute bottom-2 left-2 text-white text-[10px] font-bold"><i class="fas fa-play mr-1"></i> 10K</div></div>
                <div class="min-w-[140px] aspect-[9/16] bg-gray-900 rounded-xl relative overflow-hidden shadow-lg"><img src="https://via.placeholder.com/200x350?text=Fast+Video" class="w-full h-full object-cover opacity-80"></div>
            </div>
        </div>

        <div class="p-10 text-center text-gray-400 text-xs font-bold uppercase tracking-widest">
            You're all caught up! ✨
        </div>

    </div>

    <footer class="fixed bottom-0 w-full bg-white border-t border-gray-100 flex justify-around py-3 z-[300] shadow-[0_-5px_15px_rgba(0,0,0,0.05)]">
        <a href="index.html" class="text-center text-gray-400 flex flex-col items-center hover:text-blue-600 transition-all">
            <i class="fas fa-heart text-lg mb-0.5"></i>
            <p class="text-[10px]">For You</p>
        </a>
        <a href="fast.html" class="text-center text-gray-400 flex flex-col items-center hover:text-blue-600 transition-all">
            <i class="fas fa-play-circle text-lg mb-0.5"></i>
            <p class="text-[10px]">Fast</p>
        </a>
        <a href="discover.html" class="text-center text-blue-600 flex flex-col items-center">
            <i class="fas fa-compass text-xl mb-0.5"></i>
            <p class="text-[10px] font-bold">Discover</p>
        </a>
        <div class="text-center text-gray-400 flex flex-col items-center hover:text-blue-600"><i class="fas fa-book text-lg mb-0.5"></i><p class="text-[10px]">Library</p></div>
        <div class="text-center text-gray-400 flex flex-col items-center hover:text-blue-600"><i class="fas fa-user text-lg mb-0.5"></i><p class="text-[10px]">Me</p></div>
    </footer>

    <script>
        let timer;
        function startTimer(id) {
            timer = setTimeout(() => {
                document.getElementById('reactionBar' + id).style.display = 'flex';
            }, 600); // សង្កត់ជាប់ ០.៦ វិនាទី
        }

        function stopTimer() {
            clearTimeout(timer);
        }

        function setReaction(id, type, color) {
            const btn = document.getElementById('likeBtn' + id);
            btn.style.color = color;
            btn.querySelector('span').innerText = type;
            btn.querySelector('i').className = 'fas fa-thumbs-up';
            document.getElementById('reactionBar' + id).style.display = 'none';
        }

        function echoAction(btn) {
            btn.classList.toggle('echo-active');
            if(btn.classList.contains('echo-active')) alert('Echoed successfully! 📣');
        }

        // ចុចខាងក្រៅបាត់ Reaction Box
        window.onclick = function(event) {
            if (!event.target.closest('.reaction-box') && !event.target.closest('button[id^="likeBtn"]')) {
                document.querySelectorAll('.reaction-box').forEach(box => box.style.display = 'none');
            }
        }
    </script>

</body>
</html>
