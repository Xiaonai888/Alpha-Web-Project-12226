<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Novel Toon Preview</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body { margin: 0; background-color: #000; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        // នេះគឺជាកូដ React ដែលខ្ញុំឱ្យពីមុន
        function LoginPage() {
            return (
                <div style={{ display: 'flex', justifyContent: 'center', alignItems: 'center', height: '100vh', backgroundColor: '#000', fontFamily: 'sans-serif' }}>
                    <div style={{ backgroundColor: '#fff', padding: '40px', borderRadius: '12px', width: '350px', textAlign: 'center' }}>
                        <h1 style={{ color: '#000', margin: '0 0 10px 0' }}>NOVEL TOON</h1>
                        <p style={{ color: '#666', fontSize: '14px', marginBottom: '20px' }}>Login to read your favorite story</p>
                        <input type="text" placeholder="Email or Phone" style={{ width: '100%', padding: '12px', marginBottom: '10px', border: '1px solid #000', borderRadius: '8px', boxSizing: 'border-box' }} />
                        <input type="password" placeholder="Password" style={{ width: '100%', padding: '12px', marginBottom: '15px', border: '1px solid #000', borderRadius: '8px', boxSizing: 'border-box' }} />
                        <button style={{ width: '100%', padding: '12px', backgroundColor: '#000', color: '#fff', border: 'none', borderRadius: '8px', fontWeight: 'bold', cursor: 'pointer' }}>Log In</button>
                        <hr style={{ margin: '20px 0', border: '0', borderTop: '1px solid #eee' }} />
                        <button style={{ backgroundColor: '#fff', border: '1px solid #000', padding: '10px 20px', borderRadius: '8px', fontWeight: 'bold' }}>Create Account</button>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<LoginPage />);
    </script>
</body>
</html>
