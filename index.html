<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shadow Discover - Echo Your World</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Kantumruy+Pro:wght@400;600;700&family=Inter:wght@400;600;700&display=swap');
        
        body { 
            font-family: 'Kantumruy Pro', sans-serif; 
            background-color: #f0f2f5; 
            color: #1c1e21; 
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .feed-container { max-width: 580px; margin: 0 auto; }
        .post-card { background: white; margin-bottom: 12px; border-bottom: 1px solid #ddd; box-shadow: 0 1px 2px rgba(0,0,0,0.1); }
        @media (min-width: 640px) { .post-card { border-radius: 12px; border: 1px solid #ddd; } }

        .post-img-square { aspect-ratio: 1 / 1; object-fit: cover; width: 100%; display: block; }

        /* Navigation Logic */
        .page-content { display: none; }
        .page-content.active { display: block; }
        
        /* Reaction Bar */
        .reaction-box {
            display: none;
            position: absolute;
            bottom: 55px;
            left: 10px;
            background: white;
            padding: 8px 12px;
            border-radius: 40px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            z-index: 500;
            gap: 12px;
            animation: reactionPop 0.25s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        @keyframes reactionPop {
            from { transform: translateY(20px) scale(0.5); opacity: 0; }
            to { transform: translateY(0) scale(1); opacity: 1; }
        }
        .reaction-icon { width: 42px; height: 42px; cursor: pointer; transition: transform 0.2s ease; }
        .reaction-icon:hover { transform: scale(1.45) translateY(-8px); }

        #commentPanel {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 85vh;
            background: white;
            z-index: 1000;
            border-radius: 20px 20px 0 0;
            transform: translateY(100%);
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 -10px 40px rgba(0,0,0,0.2);
        }
        #commentPanel.active { transform: translateY(0); }

        .echo-active { color: #10b981 !important; font-weight: bold; }
        .btn-press:active { transform: scale(0.95); }
    </style>
</head>
<body class="pb-24">

    <header class="sticky top-0 z-[60] bg-white border-b border-gray-200 shadow-sm">
        <div class="px-4 py-2.5 flex justify-between items-center">
            <h1 class="text-blue-600 font-extrabold text-2xl italic tracking-tighter">Echo</h1>
            <div class="flex space-x-2.5">
                <button class="w-10 h-10 bg-gray-100 rounded-full flex items-center justify-center hover:bg-gray-200 transition-all"><i class="fas fa-plus text-gray-800"></i></button>
                <button class="w-10 h-10 bg-gray-100 rounded-full flex items-center justify-center hover:bg-gray-200 transition-all"><i class="fas fa-search text-gray-800"></i></button>
                <button class="w-10 h-10 bg-gray-100 rounded-full flex items-center justify-center text-blue-600 hover:bg-blue-50 transition-all"><i class="fab fa-facebook-messenger text-xl"></i></button>
            </div>
        </div>
        <div class="flex justify-around text-gray-500 font-bold text-sm border-t border-gray-50">
            <button class="flex-1 py-3 text-blue-600 border-b-4 border-blue-600">For You</button>
            <button class="flex-1 py-3 hover:bg-gray-50 transition-colors">Following</button>
        </div>
    </header>

    <div class="feed-container">
        
        <div id="for-you" class="page-content active">
            <div class="post-card p-4 mt-2">
                <div class="flex items-center space-x-3 mb-4">
                    <div class="w-10 h-10 rounded-full bg-gradient-to-tr from-blue-400 to-blue-600 flex items-center justify-center text-white font-bold border-2 border-white shadow-sm">U</div>
                    <button onclick="alert('Open Post Editor')" class="flex-1 bg-gray-100 rounded-full py-2.5 px-5 text-left text-gray-500 text-sm hover:bg-gray-200 transition-all active:scale-95">តើអ្នកកំពុងគិតអ្វី?</button>
                </div>
                <div class="flex justify-around border-t pt-3 text-[11px] font-bold text-gray-600">
                    <div class="flex items-center space-x-2 cursor-pointer hover:bg-gray-50 px-3 py-1 rounded-lg"><i class="fas fa-video text-red-500"></i> <span>Live</span></div>
                    <div class="flex items-center space-x-2 cursor-pointer hover:bg-gray-50 px-3 py-1 rounded-lg"><i class="fas fa-images text-green-500"></i> <span>Photo</span></div>
                    <div class="flex items-center space-x-2 cursor-pointer hover:bg-gray-50 px-3 py-1 rounded-lg"><i class="fas fa-laugh text-yellow-500"></i> <span>Feeling</span></div>
                </div>
            </div>

            <article class="post-card">
                <div class="p-3.5 flex justify-between items-center">
                    <div class="flex items-center space-x-3">
                        <div class="relative"><img src="https://via.placeholder.com/100" class="w-10 h-10 rounded-full border border-gray-100 shadow-sm"><div class="absolute bottom-0 right-0 w-3 h-3 bg-green-500 rounded-full border-2 border-white"></div></div>
                        <div><h4 class="font-bold text-[13px] hover:underline cursor-pointer">Sovan Dara</h4><p class="text-[10px] text-gray-500 font-medium">3 hours ago • <i class="fas fa-user-friends"></i></p></div>
                    </div>
                    <button class="text-gray-400 hover:bg-gray-100 w-8 h-8 rounded-full transition-all"><i class="fas fa-ellipsis-h"></i></button>
                </div>
                <div class="px-3.5 pb-3.5 text-[13.5px] leading-relaxed">
                    រីករាយថ្ងៃចុងសប្តាហ៍ជាមួយមិត្តភក្តិ! កាហ្វេនៅទីនេះពិតជាឆ្ងាញ់ខ្លាំងណាស់។ ☕️🥐✨ #CafeLife #WeekendVibes
                </div>
                <img src="https://via.placeholder.com/800x800?text=Square+Cafe+Photo" class="post-img-square cursor-pointer active:opacity-90">
                </article>
        </div>

        <div id="fast" class="page-content">
            <div class="p-4"><h2 class="font-bold text-lg mb-4">Fast Reels</h2></div>
            <div class="grid grid-cols-2 gap-2 px-2">
                <div class="aspect-[9/16] bg-gray-900 rounded-xl overflow-hidden relative">
                    <img src="https://via.placeholder.com/200x350?text=Reel+1" class="w-full h-full object-cover">
                    <div class="absolute bottom-2 left-2 text-white text-xs font-bold"><i class="fas fa-play mr-1"></i> 15K</div>
                </div>
                <div class="aspect-[9/16] bg-gray-900 rounded-xl overflow-hidden relative">
                    <img src="https://via.placeholder.com/200x350?text=Reel+2" class="w-full h-full object-cover">
                    <div class="absolute bottom-2 left-2 text-white text-xs font-bold"><i class="fas fa-play mr-1"></i> 22K</div>
                </div>
            </div>
        </div>

        <div id="discover" class="page-content">
            <div class="p-4"><h2 class="font-bold text-lg mb-4">Discover Content</h2></div>
            <div class="px-4 py-10 text-center text-gray-500">
                <i class="fas fa-compass text-5xl mb-3 text-gray-200"></i>
                <p>រុករកពិភពលោកថ្មីៗនៅទីនេះ...</p>
            </div>
        </div>

    </div>

    <footer class="fixed bottom-0 w-full bg-white border-t border-gray-100 flex justify-around py-3.5 z-[200] shadow-[0_-5px_20px_rgba(0,0,0,0.05)]">
        <button onclick="switchPage('for-you', this)" class="nav-btn text-center text-blue-600 flex flex-col items-center group transition-all">
            <i class="fas fa-heart text-[20px] mb-0.5"></i>
            <p class="text-[10px] font-bold">For You</p>
        </button>
        <button onclick="switchPage('fast', this)" class="nav-btn text-center text-gray-400 hover:text-blue-600 flex flex-col items-center group transition-all">
            <i class="fas fa-play-circle text-[20px] mb-0.5"></i>
            <p class="text-[10px] font-semibold">Fast</p>
        </button>
        <button onclick="switchPage('discover', this)" class="nav-btn text-center text-gray-400 hover:text-blue-600 flex flex-col items-center transition-all">
            <i class="fas fa-compass text-[22px] mb-0.5"></i>
            <p class="text-[10px] font-semibold">Discover</p>
        </button>
        <div class="text-center text-gray-400 flex flex-col items-center hover:text-blue-600 transition-all cursor-pointer"><i class="fas fa-book text-[20px] mb-0.5"></i><p class="text-[10px]">Library</p></div>
        <div class="text-center text-gray-400 flex flex-col items-center hover:text-blue-600 transition-all cursor-pointer"><i class="fas fa-user text-[20px] mb-0.5"></i><p class="text-[10px]">Me</p></div>
    </footer>

    <script>
        // ប្តូរទំព័រដោយមិនចាំបាច់ Reload
        function switchPage(pageId, element) {
            // លាក់គ្រប់ Content ទាំងអស់
            document.querySelectorAll('.page-content').forEach(page => {
                page.classList.remove('active');
            });
            
            // បង្ហាញ Content ដែលបានជ្រើសរើស
            document.getElementById(pageId).classList.add('active');

            // ប្តូរពណ៌ Icon ក្នុង Footer
            document.querySelectorAll('.nav-btn').forEach(btn => {
                btn.classList.remove('text-blue-600');
                btn.classList.add('text-gray-400');
                btn.querySelector('p').classList.remove('font-bold');
                btn.querySelector('p').classList.add('font-semibold');
            });

            element.classList.add('text-blue-600');
            element.classList.remove('text-gray-400');
            element.querySelector('p').classList.add('font-bold');
            
            // រំកិលទៅលើគេវិញ
            window.scrollTo(0, 0);
        }

        // Logic សម្រាប់ Reaction (ដូចមុន)
        let reactionTimer;
        function startTimer(id) {
            reactionTimer = setTimeout(() => {
                document.getElementById('reactionBar' + id).style.display = 'flex';
            }, 600); 
        }
        function stopTimer() { clearTimeout(reactionTimer); }
    </script>
</body>
</html>
