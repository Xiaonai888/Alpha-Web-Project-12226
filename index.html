<div class="px-0 relative mt-2 group"> <div class="main-carousel w-full aspect-[16/9] bg-white rounded-xl overflow-hidden focus:outline-none shadow-lg">
        
        <div class="carousel-cell w-4/5 h-full mr-4 rounded-xl overflow-hidden relative">
            <img src="តំណភ្ជាប់រូបភាពទី១_16x9.webp" class="w-full h-full object-cover">
            <div class="absolute bottom-4 left-4 text-white bg-black/30 p-2 rounded backdrop-blur-sm">
                <h2 class="font-bold text-lg">Call Me As Your Name</h2>
            </div>
        </div>
        
        <div class="carousel-cell w-4/5 h-full mr-4 rounded-xl overflow-hidden">
            <img src="តំណភ្ជាប់រូបភាពទី២_16x9.webp" class="w-full h-full object-cover">
        </div>
        
        <div class="carousel-cell w-4/5 h-full mr-4 rounded-xl overflow-hidden">
            <img src="តំណភ្ជាប់រូបភាពទី៣_16x9.webp" class="w-full h-full object-cover">
        </div>

        </div>

    <div class="flex justify-center space-x-2 mt-4" id="dots-container">
        <div class="dot w-6 h-2 rounded-full bg-blue-500 cursor-pointer"></div>
        <div class="dot w-2 h-2 rounded-full bg-gray-300 cursor-pointer"></div>
        <div class="dot w-2 h-2 rounded-full bg-gray-300 cursor-pointer"></div>
        <div class="dot w-2 h-2 rounded-full bg-gray-300 cursor-pointer"></div>
        <div class="dot w-2 h-2 rounded-full bg-gray-300 cursor-pointer"></div>
        <div class="dot w-2 h-2 rounded-full bg-gray-300 cursor-pointer"></div>
        <div class="dot w-2 h-2 rounded-full bg-gray-300 cursor-pointer"></div>
    </div>
</div>

<style>
    /* ធ្វើឱ្យរូបភាពសងខាងស្រអាប់ (Dimmed) */
    .carousel-cell {
        opacity: 0.5; /* កម្រិតស្រអាប់ ៥០% */
        transform: scale(0.9); /* បង្រួមតូចបន្តិច */
        transition: opacity 0.5s ease, transform 0.5s ease;
    }

    /* ធ្វើឱ្យរូបភាពកណ្តាលច្បាស់ និងធំ */
    .carousel-cell.is-selected {
        opacity: 1; /* ជោគជ័យ ១០០% */
        transform: scale(1); /* ទំហំដើម */
    }
</style>

<script src="https://unpkg.com/flickity@2/dist/flickity.pkgd.min.js"></script>
<script>
    // ខួរក្បាលបញ្ជា Carousel
    var flkty = new Flickity('.main-carousel', {
        cellAlign: 'center', // ឱ្យរូបភាពកណ្តាលមកចំកណ្តាល
        contain: true,
        wrapAround: true, // ឱ្យវាវិលជុំវិញ (៧ រូបភាព)
        autoPlay: 5000, // ដូររូបរៀងរាល់ ៥ វិនាទី
        prevNextButtons: false, // លាក់ប៊ូតុង Next/Prev ដើម្បីឱ្យដូច App អាជីព
        pageDots: false // លាក់ Dots ដើមរបស់ Flickity
    });

    // ភ្ជាប់គ្រាប់ចុច (Dots) ខាងក្រោមជាមួយ Carousel
    var dotsContainer = document.getElementById('dots-container');
    var dots = dotsContainer.querySelectorAll('.dot');

    flkty.on('select', function(index) {
        dots.forEach(function(dot, i) {
            dot.classList.toggle('bg-blue-500', i === index);
            dot.classList.toggle('bg-gray-300', i !== index);
            dot.style.width = i === index ? '24px' : '8px'; // គ្រាប់ចុចដែលកំពុងបង្ហាញនឹងវែងជាងគេ
        });
    });

    // ឱ្យអ្នកប្រើចុចលើ Dot ដើម្បីប្តូររូប
    dots.forEach(function(dot, i) {
        dot.addEventListener('click', function() {
            flkty.select(i);
        });
    });
</script>
