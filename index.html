<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shadow Discover - Echo Your World</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Kantumruy+Pro:wght@400;600;700&display=swap');
        body { font-family: 'Kantumruy Pro', sans-serif; background-color: #f0f2f5; color: #1c1e21; overflow-x: hidden; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        /* Square Image Fix */
        .post-img-square { aspect-ratio: 1 / 1; object-fit: cover; width: 100%; }
        
        /* Facebook-like Reaction Bar */
        .reaction-box {
            display: none;
            position: absolute;
            bottom: 45px;
            left: 10px;
            background: white;
            padding: 5px 10px;
            border-radius: 30px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            z-index: 100;
            animation: popUp 0.2s ease-out;
        }
        @keyframes popUp {
            from { transform: translateY(10px) scale(0.5); opacity: 0; }
            to { transform: translateY(0) scale(1); opacity: 1; }
        }
        .reaction-icon { width: 35px; transition: transform 0.2s; cursor: pointer; }
        .reaction-icon:hover { transform: scale(1.3); }

        /* Echo Button Style */
        .echo-active { color: #10b981 !important; font-weight: bold; }
    </style>
</head>
<body class="pb-24">

    <header class="sticky top-0 z-50 bg-white border-b border-gray-200 px-4 py-2 flex justify-between items-center shadow-sm">
        <h1 class="text-blue-600 font-extrabold text-2xl italic tracking-tighter">Echo</h1>
        <div class="flex space-x-2">
            <button class="w-10 h-10 bg-gray-100 rounded-full flex items-center justify-center hover:bg-gray-200"><i class="fas fa-search"></i></button>
            <button class="w-10 h-10 bg-gray-100 rounded-full flex items-center justify-center text-blue-600 hover:bg-gray-200"><i class="fab fa-facebook-messenger"></i></button>
        </div>
    </header>

    <div class="max-w-[550px] mx-auto space-y-2.5">

        <div class="bg-white p-4 shadow-sm">
            <div class="flex items-center space-x-3 mb-4">
                <div class="w-10 h-10 rounded-full bg-blue-500 flex items-center justify-center text-white font-bold border">U</div>
                <button class="flex-1 bg-gray-100 rounded-full py-2 px-5 text-left text-gray-500 text-sm">តើអ្នកកំពុងគិតអ្វី?</button>
            </div>
            <div class="flex justify-around border-t pt-3 text-[11px] font-bold text-gray-600">
                <span><i class="fas fa-video text-red-500 mr-2"></i> Live</span>
                <span><i class="fas fa-images text-green-500 mr-2"></i> Photo</span>
                <span><i class="fas fa-laugh text-yellow-500 mr-2"></i> Feeling</span>
            </div>
        </div>

        <div class="bg-white shadow-sm">
            <div class="p-3 flex justify-between items-center">
                <div class="flex items-center space-x-3">
                    <img src="https://via.placeholder.com/100" class="w-10 h-10 rounded-full border">
                    <div><h4 class="font-bold text-sm">Shadow Official <i class="fas fa-check-circle text-blue-500 text-[10px]"></i></h4><p class="text-[10px] text-gray-500">Just now • <i class="fas fa-globe-americas"></i></p></div>
                </div>
                <i class="fas fa-ellipsis-h text-gray-400"></i>
            </div>
            <p class="px-3 pb-3 text-sm">រឿងថ្មី "Echo of Shadow" ចេញផ្សាយហើយ! កុំភ្លេច Echo ទៅកាន់មិត្តភក្តិផង។ 🚀📖</p>
            <img src="https://via.placeholder.com/600x600?text=Shadow+Novel+Cover" class="post-img-square">
            
            <div class="px-3 py-2 flex justify-between items-center text-gray-500 text-[11px] border-b mx-2">
                <div class="flex items-center space-x-1">
                    <span class="flex -space-x-1">
                        <i class="fas fa-thumbs-up bg-blue-500 text-white p-1 rounded-full text-[8px] border border-white"></i>
                        <i class="fas fa-heart bg-red-500 text-white p-1 rounded-full text-[8px] border border-white"></i>
                    </span>
                    <span class="pl-1">1.5K</span>
                </div>
                <div>45 Comments • 12 Echoes</div>
            </div>

            <div class="flex py-1 px-2 relative">
                <div class="reaction-box flex space-x-2" id="reactionBar">
                    <img src="https://img.icons8.com/color/48/thumbs-up.png" class="reaction-icon" onclick="setReaction('Like', '#1877f2')">
                    <img src="https://img.icons8.com/color/48/filled-like.png" class="reaction-icon" onclick="setReaction('Love', '#f33e58')">
                    <img src="https://img.icons8.com/color/48/grinning-face-with-smiling-eyes.png" class="reaction-icon" onclick="setReaction('Haha', '#f7b125')">
                    <img src="https://img.icons8.com/color/48/wow.png" class="reaction-icon" onclick="setReaction('Wow', '#f7b125')">
                    <img src="https://img.icons8.com/color/48/sad.png" class="reaction-icon" onclick="setReaction('Sad', '#f7b125')">
                    <img src="https://img.icons8.com/color/48/angry.png" class="reaction-icon" onclick="setReaction('Angry', '#e9710f')">
                </div>

                <button onmousedown="startTimer()" onmouseup="stopTimer()" onclick="simpleLike(this)" class="flex-1 flex items-center justify-center space-x-2 py-2 hover:bg-gray-100 rounded-md text-gray-600 transition-all" id="likeBtn">
                    <i class="far fa-thumbs-up"></i> <span class="text-xs font-bold">Like</span>
                </button>
                <button onclick="alert('Comment box opening...')" class="flex-1 flex items-center justify-center space-x-2 py-2 hover:bg-gray-100 rounded-md text-gray-600">
                    <i class="far fa-comment"></i> <span class="text-xs font-bold">Comment</span>
                </button>
                <button onclick="echoPost(this)" class="flex-1 flex items-center justify-center space-x-2 py-2 hover:bg-gray-100 rounded-md text-gray-600">
                    <i class="fas fa-share-square"></i> <span class="text-xs font-bold">Echo</span>
                </button>
            </div>
        </div>

    </div>

    <footer class="fixed bottom-0 w-full bg-white border-t border-gray-100 flex justify-around py-3 z-[100] shadow-[0_-5px_15px_rgba(0,0,0,0.05)] text-gray-400">
        <a href="index.html" class="text-center flex flex-col items-center hover:text-blue-600"><i class="fas fa-heart text-lg mb-0.5"></i><p class="text-[10px]">For You</p></a>
        <a href="fast.html" class="text-center flex flex-col items-center hover:text-blue-600"><i class="fas fa-play-circle text-lg mb-0.5"></i><p class="text-[10px]">Fast</p></a>
        <a href="discover.html" class="text-center text-blue-600 flex flex-col items-center"><i class="fas fa-compass text-xl mb-0.5"></i><p class="text-[10px] font-bold">Discover</p></a>
        <div class="text-center flex flex-col items-center hover:text-blue-600"><i class="fas fa-book text-lg mb-0.5"></i><p class="text-[10px]">Library</p></div>
        <div class="text-center flex flex-col items-center hover:text-blue-600"><i class="fas fa-user text-lg mb-0.5"></i><p class="text-[10px]">Me</p></div>
    </footer>

    <script>
        let timer;
        const reactionBar = document.getElementById('reactionBar');
        const likeBtn = document.getElementById('likeBtn');

        // ចុចជាប់ដើម្បីបង្ហាញ Reactions
        function startTimer() {
            timer = setTimeout(() => {
                reactionBar.style.display = 'flex';
            }, 500); // ០.៥ វិនាទី
        }

        function stopTimer() {
            clearTimeout(timer);
        }

        // ចុច Like ធម្មតា
        function simpleLike(btn) {
            if (reactionBar.style.display === 'flex') return;
            btn.classList.toggle('text-blue-600');
            const icon = btn.querySelector('i');
            icon.className = icon.classList.contains('far') ? 'fas fa-thumbs-up' : 'far fa-thumbs-up';
        }

        // ជ្រើសរើស Reaction ណាមួយ
        function setReaction(type, color) {
            likeBtn.style.color = color;
            likeBtn.querySelector('span').innerText = type;
            likeBtn.querySelector('i').className = 'fas fa-thumbs-up'; // អាចដូរតាម Icon ពិតៗបាន
            reactionBar.style.display = 'none';
        }

        // មុខងារ Echo (Share)
        function echoPost(btn) {
            btn.classList.toggle('echo-active');
            if(btn.classList.contains('echo-active')) {
                alert('Echoed successfully to your profile! 📣');
            }
        }

        // ចុចកន្លែងណាផ្សេងឱ្យបាត់ Reaction Bar
        window.onclick = function(event) {
            if (!event.target.matches('.reaction-icon') && !event.target.closest('#likeBtn')) {
                reactionBar.style.display = 'none';
            }
        }
    </script>
</body>
</html>
