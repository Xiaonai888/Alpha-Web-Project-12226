<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shadow - For You</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #fff; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="pb-20"> <header class="flex justify-between items-center px-4 py-3 sticky top-0 bg-white z-50">
        <div class="flex items-center space-x-2">
            <img src="https://via.placeholder.com/30" alt="Logo" class="rounded-full">
            <h1 class="text-blue-500 font-bold text-xl">Shadow</h1>
        </div>
        <div class="flex space-x-4 text-gray-400 text-xl">
            <i class="fas fa-search"></i>
            <i class="fas fa-bell"></i>
        </div>
    </header>

    <nav class="flex px-4 space-x-6 border-b border-gray-100">
        <button class="pb-2 border-b-2 border-blue-500 text-blue-500 font-bold">Novel</button>
        <button class="pb-2 text-gray-400">Chat Story</button>
        <button class="pb-2 text-gray-400">Manga</button>
    </nav>

    <div class="flex space-x-2 px-4 py-4 overflow-x-auto no-scrollbar">
        <button class="bg-blue-500 text-white px-6 py-1 rounded-full text-sm">Today</button>
        <button class="border border-gray-200 px-6 py-1 rounded-full text-sm">Romance</button>
        <button class="border border-gray-200 px-6 py-1 rounded-full text-sm">Fantasy</button>
        <button class="border border-gray-200 px-6 py-1 rounded-full text-sm">BL</button>
        <button class="border border-gray-200 px-6 py-1 rounded-full text-sm">Investigation</button>
    </div>

    <div class="px-4 relative">
        <div class="w-full h-56 bg-gray-200 rounded-xl overflow-hidden relative">
            <img src="https://via.placeholder.com/800x400" class="w-full h-full object-cover">
            <div class="absolute bottom-4 left-4 text-white">
                <h2 class="font-bold text-lg">Call Me As Your Name</h2>
                <p class="text-xs opacity-80">Romance No.312</p>
            </div>
            <div class="absolute bottom-4 right-4 flex space-x-1">
                <div class="w-2 h-2 bg-white rounded-full"></div>
                <div class="w-2 h-2 bg-white/50 rounded-full"></div>
                <div class="w-2 h-2 bg-white/50 rounded-full"></div>
            </div>
        </div>
    </div>

    <div class="flex justify-around py-8 px-4 text-center">
        <div><div class="w-14 h-14 bg-gray-200 rounded-full mb-1 mx-auto"></div><span class="text-xs text-gray-500">Shop</span></div>
        <div><div class="w-14 h-14 bg-gray-200 rounded-full mb-1 mx-auto"></div><span class="text-xs text-gray-500">Tasks</span></div>
        <div><div class="w-14 h-14 bg-gray-200 rounded-full mb-1 mx-auto"></div><span class="text-xs text-gray-500">Ranking</span></div>
        <div><div class="w-14 h-14 bg-gray-200 rounded-full mb-1 mx-auto"></div><span class="text-xs text-gray-500">Event</span></div>
    </div>

    <div class="px-4 mb-8">
        <h3 class="font-bold mb-4">Alpha Spotlight</h3>
        <div class="flex space-x-4 overflow-x-auto no-scrollbar">
            <div class="min-w-[70%] h-40 bg-gray-200 rounded-lg"></div>
            <div class="min-w-[70%] h-40 bg-gray-200 rounded-lg"></div>
        </div>
        <div class="flex justify-center space-x-1 mt-3">
            <div class="w-2 h-2 bg-blue-500 rounded-full"></div>
            <div class="w-2 h-2 bg-gray-300 rounded-full"></div>
            <div class="w-2 h-2 bg-gray-300 rounded-full"></div>
        </div>
    </div>

    <div class="px-4 mb-8">
        <div class="flex justify-between items-center mb-4">
            <h3 class="font-bold"><i class="fas fa-star text-yellow-400 mr-2"></i>Must Reads</h3>
        </div>
        <div class="grid grid-cols-2 gap-4">
            <div>
                <div class="aspect-[4/3] bg-gray-800 rounded-lg flex items-center justify-center text-white text-3xl mb-2">L</div>
                <span class="bg-orange-400 text-white text-[10px] px-2 py-0.5 rounded">Fantasy</span>
                <span class="text-gray-400 text-[10px] ml-2">EP 20</span>
                <h4 class="font-bold text-sm mt-1">Book title</h4>
            </div>
            <div>
                <div class="aspect-[4/3] bg-gray-800 rounded-lg flex items-center justify-center text-white text-3xl mb-2">L</div>
                <span class="bg-orange-400 text-white text-[10px] px-2 py-0.5 rounded">Romance</span>
                <span class="text-gray-400 text-[10px] ml-2">EP 20</span>
                <h4 class="font-bold text-sm mt-1">Book title</h4>
            </div>
        </div>
    </div>

    <footer class="fixed bottom-0 w-full bg-white border-t border-gray-100 flex justify-around py-3">
        <div class="text-center text-black">
            <i class="fas fa-heart"></i>
            <p class="text-[10px]">For You</p>
        </div>
        <div class="text-center text-gray-400">
            <i class="fas fa-play-circle"></i>
            <p class="text-[10px]">Fast</p>
        </div>
        <div class="text-center text-gray-400">
            <i class="fas fa-compass"></i>
            <p class="text-[10px]">Discover</p>
        </div>
        <div class="text-center text-gray-400">
            <i class="fas fa-book"></i>
            <p class="text-[10px]">Library</p>
        </div>
        <div class="text-center text-gray-400">
            <i class="fas fa-user"></i>
            <p class="text-[10px]">Me</p>
        </div>
    </footer>

</body>
</html>
