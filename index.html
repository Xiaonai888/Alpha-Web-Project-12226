<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shadow - For You</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/swiper/swiper-bundle.min.css" />
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Kantumruy+Pro:wght@400;600;700&display=swap');
        
        body { 
            font-family: 'Kantumruy Pro', sans-serif; 
            background-color: #fff; 
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }
        
        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        /* Swiper Banner Style */
        .swiper-container { width: 100%; padding-top: 10px; padding-bottom: 20px; }
        .swiper-slide { 
            width: 85%; 
            border-radius: 20px; 
            overflow: hidden; 
            box-shadow: 0 10px 20px rgba(0,0,0,0.1); 
            transition: all 0.3s ease;
        }
        .swiper-slide-active { transform: scale(1.02); }

        /* Alpha Spotlight Layout */
        .spotlight-card { transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        .spotlight-card:hover { transform: translateY(-5px) scale(1.02); }
    </style>
</head>
<body class="pb-32">

    <header class="flex justify-between items-center px-5 py-4 sticky top-0 bg-white z-50 shadow-sm">
        <div class="flex items-center space-x-2">
            <div class="w-10 h-10 bg-blue-600 rounded-full flex items-center justify-center text-white font-bold shadow-lg">S</div>
            <h1 class="text-blue-600 font-extrabold text-2xl tracking-tighter italic">Shadow</h1>
        </div>
        <div class="flex space-x-5 text-gray-400 text-xl">
            <i class="fas fa-search cursor-pointer"></i>
            <i class="fas fa-bell cursor-pointer"></i>
        </div>
    </header>

    <div class="swiper-container mySwiper">
        <div class="swiper-wrapper">
            <div class="swiper-slide aspect-[16/9]"><img src="assets/banners/K26.jpg" class="w-full h-full object-cover"></div>
            <div class="swiper-slide aspect-[16/9]"><img src="assets/banners/K27.jpg" class="w-full h-full object-cover"></div>
            <div class="swiper-slide aspect-[16/9]"><img src="assets/banners/K28.jpg" class="w-full h-full object-cover"></div>
            <div class="swiper-slide aspect-[16/9]"><img src="assets/banners/K29.jpg" class="w-full h-full object-cover"></div>
            <div class="swiper-slide aspect-[16/9]"><img src="assets/banners/K30.jpg" class="w-full h-full object-cover"></div>
            <div class="swiper-slide aspect-[16/9]"><img src="assets/banners/K31.jpg" class="w-full h-full object-cover"></div>
            <div class="swiper-slide aspect-[16/9]"><img src="assets/banners/K32.jpg" class="w-full h-full object-cover"></div>
        </div>
        <div class="swiper-pagination"></div>
    </div>

    <div class="grid grid-cols-4 gap-4 py-6 px-5 text-center">
        <div class="group cursor-pointer">
            <div class="w-12 h-12 bg-gray-50 rounded-full mb-1.5 mx-auto flex items-center justify-center group-hover:bg-blue-50 transition-all">
                <i class="fas fa-shopping-bag text-gray-500 group-hover:text-blue-600"></i>
            </div>
            <span class="text-[10px] text-gray-500 font-bold uppercase tracking-wider">Shop</span>
        </div>
        <div class="group cursor-pointer">
            <div class="w-12 h-12 bg-gray-50 rounded-full mb-1.5 mx-auto flex items-center justify-center group-hover:bg-blue-50 transition-all">
                <i class="fas fa-tasks text-gray-500 group-hover:text-blue-600"></i>
            </div>
            <span class="text-[10px] text-gray-500 font-bold uppercase tracking-wider">Tasks</span>
        </div>
        <div class="group cursor-pointer">
            <div class="w-12 h-12 bg-gray-50 rounded-full mb-1.5 mx-auto flex items-center justify-center group-hover:bg-blue-50 transition-all">
                <i class="fas fa-trophy text-gray-500 group-hover:text-blue-600"></i>
            </div>
            <span class="text-[10px] text-gray-500 font-bold uppercase tracking-wider">Ranking</span>
        </div>
        <div class="group cursor-pointer">
            <div class="w-12 h-12 bg-gray-50 rounded-full mb-1.5 mx-auto flex items-center justify-center group-hover:bg-blue-50 transition-all">
                <i class="fas fa-calendar-star text-gray-500 group-hover:text-blue-600"></i>
            </div>
            <span class="text-[10px] text-gray-500 font-bold uppercase tracking-wider">Event</span>
        </div>
    </div>

    <div class="px-5 py-4">
        <div class="flex justify-between items-center mb-5">
            <h3 class="font-extrabold text-gray-900 text-xl tracking-tight">Alpha Spotlight</h3>
            <i class="fas fa-chevron-right text-gray-300 text-sm"></i>
        </div>
        <div class="flex space-x-5 overflow-x-auto no-scrollbar pb-4">
            <div class="spotlight-card min-w-[280px] aspect-[16/10] bg-gray-200 rounded-2xl overflow-hidden relative shadow-lg">
                <img src="assets/banners/K26.jpg" class="w-full h-full object-cover">
                <div class="absolute inset-0 bg-gradient-to-t from-black/80 via-transparent to-transparent"></div>
                <div class="absolute bottom-4 left-4 text-white">
                    <span class="bg-blue-600 text-[9px] font-bold px-2 py-0.5 rounded uppercase">Featured</span>
                    <h4 class="font-bold text-base mt-1">Alpha Adventure</h4>
                </div>
            </div>
            <div class="spotlight-card min-w-[280px] aspect-[16/10] bg-gray-200 rounded-2xl overflow-hidden relative shadow-lg">
                <img src="assets/banners/K27.jpg" class="w-full h-full object-cover">
                <div class="absolute inset-0 bg-gradient-to-t from-black/80 via-transparent to-transparent"></div>
                <div class="absolute bottom-4 left-4 text-white">
                    <span class="bg-orange-500 text-[9px] font-bold px-2 py-0.5 rounded uppercase">Trending</span>
                    <h4 class="font-bold text-base mt-1">The Shadow Legacy</h4>
                </div>
            </div>
        </div>
    </div>

    <div class="flex space-x-3 px-5 py-4 overflow-x-auto no-scrollbar mb-4">
        <button class="bg-blue-600 text-white px-6 py-2 rounded-full text-xs font-bold shrink-0 shadow-md">Today</button>
        <button class="border border-gray-200 px-5 py-2 rounded-full text-xs font-semibold text-gray-600 shrink-0 hover:border-blue-400">Romance</button>
        <button class="border border-gray-200 px-5 py-2 rounded-full text-xs font-semibold text-gray-600 shrink-0 hover:border-blue-400">Action</button>
        <button class="border border-gray-200 px-5 py-2 rounded-full text-xs font-semibold text-gray-600 shrink-0 hover:border-blue-400">Fantasy</button>
    </div>

    <div class="px-5 mb-16">
        <div class="flex justify-between items-center mb-6">
            <h3 class="font-extrabold text-gray-900 text-xl tracking-tight">Must Reads</h3>
            <button class="text-blue-600 text-xs font-bold">See All</button>
        </div>
        <div class="grid grid-cols-2 gap-x-5 gap-y-8">
            <div class="group cursor-pointer">
                <div class="aspect-[3/4.2] bg-gray-100 rounded-2xl overflow-hidden mb-3 shadow-sm group-hover:shadow-xl transition-all duration-300">
                    <img src="assets/fast/your_book_1.jpg" class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-500" onerror="this.src='https://via.placeholder.com/300x420?text=Shadow+Bride'">
                </div>
                <h4 class="font-bold text-sm text-gray-900 truncate group-hover:text-blue-600 transition-colors">Shadow Bride</h4>
                <div class="flex items-center space-x-2 mt-1">
                    <span class="text-[9px] bg-yellow-100 text-yellow-700 px-2 py-0.5 rounded font-bold uppercase">Fantasy</span>
                    <span class="text-[10px] text-gray-400">EP 20</span>
                </div>
            </div>
            <div class="group cursor-pointer">
                <div class="aspect-[3/4.2] bg-gray-100 rounded-2xl overflow-hidden mb-3 shadow-sm group-hover:shadow-xl transition-all duration-300">
                    <img src="assets/fast/your_book_2.jpg" class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-500" onerror="this.src='https://via.placeholder.com/300x420?text=The+Last+Echo'">
                </div>
                <h4 class="font-bold text-sm text-gray-900 group-hover:text-blue-600 transition-colors">The Last Echo</h4>
                <div class="flex items-center space-x-2 mt-1">
                    <span class="text-[9px] bg-purple-100 text-purple-700 px-2 py-0.5 rounded font-bold uppercase">Drama</span>
                    <span class="text-[10px] text-gray-400">EP 45</span>
                </div>
            </div>
        </div>
    </div>

    <footer class="fixed bottom-0 w-full bg-white border-t border-gray-100 flex justify-around py-4 z-[100] shadow-[0_-5px_15px_rgba(0,0,0,0.05)]">
        <a href="index.html" class="text-center text-blue-600 flex flex-col items-center">
            <i class="fas fa-heart text-[22px] mb-0.5"></i>
            <p class="text-[10px] font-extrabold">For You</p>
        </a>
        <a href="fast.html" class="text-center text-gray-400 hover:text-blue-600 flex flex-col items-center group transition-all">
            <i class="fas fa-play-circle text-[20px] mb-0.5 group-hover:scale-110 transition-transform"></i>
            <p class="text-[10px] font-bold">Fast</p>
        </a>
        <a href="discover.html" class="text-center text-gray-400 hover:text-blue-600 flex flex-col items-center group transition-all">
            <i class="fas fa-compass text-[20px] mb-0.5 group-hover:scale-110 transition-transform"></i>
            <p class="text-[10px] font-bold">Discover</p>
        </a>
        <div class="text-center text-gray-400 flex flex-col items-center hover:text-blue-600 cursor-pointer transition-all">
            <i class="fas fa-book text-[20px] mb-0.5"></i>
            <p class="text-[10px] font-bold">Library</p>
        </div>
        <div class="text-center text-gray-400 flex flex-col items-center hover:text-blue-600 cursor-pointer transition-all">
            <i class="fas fa-user text-[20px] mb-0.5"></i>
            <p class="text-[10px] font-bold">Me</p>
        </div>
    </footer>

    <script src="https://unpkg.com/swiper/swiper-bundle.min.js"></script>
    <script>
        var swiper = new Swiper(".mySwiper", {
            centeredSlides: true,
            slidesPerView: "auto",
            spaceBetween: 20,
            loop: true,
            autoplay: { delay: 4000, disableOnInteraction: false },
            pagination: { el: ".swiper-pagination", clickable: true }
        });
    </script>
</body>
</html>
