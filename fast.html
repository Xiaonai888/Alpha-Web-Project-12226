<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shadow Fast - Reels & Friends</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Kantumruy+Pro:wght@400;600;700&display=swap');
        body { font-family: 'Kantumruy Pro', sans-serif; background-color: #000; margin: 0; overflow: hidden; }

        .reels-container {
            height: 100vh;
            overflow-y: scroll;
            scroll-snap-type: y mandatory;
            scrollbar-width: none;
            padding-bottom: 80px;
        }
        .reels-container::-webkit-scrollbar { display: none; }
        
        .reel-item {
            height: 100vh;
            scroll-snap-align: start;
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
        }

        .icon-shadow { text-shadow: 0 2px 10px rgba(0, 0, 0, 0.8); }
        
        /* ស្ទីលសម្រាប់ប៊ូតុងដែលជ្រើសរើស (Active Tab) */
        .tab-active { color: white !important; opacity: 1 !important; }
        .tab-active::after {
            content: '';
            position: absolute;
            bottom: -8px;
            left: 50%;
            transform: translateX(-50%);
            width: 4px;
            height: 4px;
            background-color: white;
            border-radius: 50%;
        }
    </style>
</head>
<body>

    <div class="fixed top-12 left-0 w-full z-50 flex justify-center items-center px-6 text-white/60 font-bold space-x-8">
        <button id="btnReels" onclick="switchTab('reels')" class="header-tab tab-active relative text-lg transition-all">Reels</button>
        <button id="btnFriends" onclick="switchTab('friends')" class="header-tab relative text-lg transition-all">Friends</button>
        <div class="absolute right-6"><i class="fas fa-camera text-xl text-white/90"></i></div>
    </div>

    <div id="reelsContent" class="reels-container no-scrollbar">
        <div class="reel-item">
            <img src="https://via.placeholder.com/1080x1920?text=Trending+Reel+1" class="absolute inset-0 w-full h-full object-cover">
            <div class="absolute inset-0 bg-gradient-to-t from-black/90 via-transparent to-black/20"></div>
            <div class="absolute right-3 bottom-32 flex flex-col items-center space-y-6 text-white z-20">
                <div class="w-10 h-10 rounded-full border-2 border-white overflow-hidden shadow-lg"><img src="https://via.placeholder.com/100" class="w-full h-full object-cover"></div>
                <div class="flex flex-col items-center"><i class="fas fa-heart text-2xl icon-shadow"></i><span class="text-[11px] mt-1 font-bold">258K</span></div>
                <div class="flex flex-col items-center"><i class="fas fa-comment-dots text-2xl icon-shadow"></i><span class="text-[11px] mt-1 font-bold">2,152</span></div>
                <div class="w-8 h-8 rounded-full border-2 border-white/50 bg-black mt-2 overflow-hidden shadow-md"><img src="https://via.placeholder.com/50" class="w-full h-full object-cover"></div>
            </div>
            <div class="relative p-4 text-white mb-24 max-w-[85%] z-10">
                <h3 class="font-bold text-sm mb-2">trending_now <i class="fas fa-check-circle text-blue-400 text-[10px]"></i></h3>
                <p class="text-xs opacity-90">វីដេអូដែលកំពុងល្បីខ្លាំងនាពេលនេះ! 🔥 #Trending #Shadow</p>
            </div>
        </div>
        </div>

    <div id="friendsContent" class="reels-container no-scrollbar hidden">
        <div class="reel-item">
            <img src="https://via.placeholder.com/1080x1920?text=Friend+Video+1" class="absolute inset-0 w-full h-full object-cover">
            <div class="absolute inset-0 bg-gradient-to-t from-black/90 via-transparent to-black/20"></div>
            <div class="absolute right-3 bottom-32 flex flex-col items-center space-y-6 text-white z-20">
                <div class="w-10 h-10 rounded-full border-2 border-pink-500 overflow-hidden shadow-lg"><img src="https://via.placeholder.com/100" class="w-full h-full object-cover"></div>
                <div class="flex flex-col items-center"><i class="fas fa-heart text-2xl text-red-500"></i><span class="text-[11px] mt-1 font-bold">45</span></div>
                <div class="flex flex-col items-center"><i class="fas fa-comment-dots text-2xl"></i><span class="text-[11px] mt-1 font-bold">12</span></div>
                <div class="w-8 h-8 rounded-full border-2 border-white/50 bg-black mt-2 overflow-hidden shadow-md"><img src="https://via.placeholder.com/50" class="w-full h-full object-cover"></div>
            </div>
            <div class="relative p-4 text-white mb-24 max-w-[85%] z-10">
                <h3 class="font-bold text-sm mb-2">Your_BFF_Name 💖</h3>
                <p class="text-xs opacity-90">តើអ្នកដឹងទេថាថ្ងៃនេះមិត្តភក្តិរបស់អ្នកធ្វើអ្វីខ្លះ? 🥰 #Friends #Vlog</p>
            </div>
        </div>
        </div>

    <footer class="fixed bottom-0 w-full bg-white border-t border-gray-100 flex justify-around py-3 z-[100] shadow-[0_-5px_15px_rgba(0,0,0,0.05)]">
        <a href="index.html" class="text-center text-gray-400 flex flex-col items-center"><i class="fas fa-heart text-lg mb-0.5"></i><p class="text-[10px]">For You</p></a>
        <a href="fast.html" class="text-center text-blue-600 flex flex-col items-center"><i class="fas fa-play-circle text-xl mb-0.5"></i><p class="text-[10px] font-bold">Fast</p></a>
        <div class="text-center text-gray-400 flex flex-col items-center"><i class="fas fa-compass text-lg mb-0.5"></i><p class="text-[10px]">Discover</p></div>
        <div class="text-center text-gray-400 flex flex-col items-center"><i class="fas fa-book text-lg mb-0.5"></i><p class="text-[10px]">Library</p></div>
        <div class="text-center text-gray-400 flex flex-col items-center"><i class="fas fa-user text-lg mb-0.5"></i><p class="text-[10px]">Me</p></div>
    </footer>

    <script>
        function switchTab(type) {
            const reelsContent = document.getElementById('reelsContent');
            const friendsContent = document.getElementById('friendsContent');
            const btnReels = document.getElementById('btnReels');
            const btnFriends = document.getElementById('btnFriends');

            if (type === 'reels') {
                reelsContent.classList.remove('hidden');
                friendsContent.classList.add('hidden');
                btnReels.classList.add('tab-active');
                btnFriends.classList.remove('tab-active');
            } else {
                reelsContent.classList.add('hidden');
                friendsContent.classList.remove('hidden');
                btnReels.classList.remove('tab-active');
                btnFriends.classList.add('tab-active');
            }
        }
    </script>

</body>
</html>
