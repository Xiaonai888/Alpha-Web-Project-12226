<!DOCTYPE html>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Kantumruy+Pro:wght@400;600;700&display=swap');
        body { font-family: 'Kantumruy Pro', sans-serif; background-color: #000; margin: 0; overflow: hidden; }

        .reels-container {
            height: 100vh;
            overflow-y: scroll;
            scroll-snap-type: y mandatory;
            scrollbar-width: none;
        }
        .reels-container::-webkit-scrollbar { display: none; }
        .reel-item {
            height: 100vh;
            scroll-snap-align: start;
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
        }
        .icon-shadow { text-shadow: 0 2px 8px rgba(0, 0, 0, 0.5); }
    </style>
</head>
<body>

    <div class="fixed top-10 left-0 w-full z-50 flex justify-center items-center px-6 text-white/80 font-bold space-x-6">
