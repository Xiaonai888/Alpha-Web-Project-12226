<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shadow Fast - Reels Experience</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Kantumruy+Pro:wght@400;600;700&display=swap');
        body { font-family: 'Kantumruy Pro', sans-serif; background-color: #000; margin: 0; overflow: hidden; }

        /* Reels Vertical Scroll */
        .reels-container {
            height: 100vh;
            overflow-y: scroll;
            scroll-snap-type: y mandatory;
            scrollbar-width: none;
        }
        .reels-container::-webkit-scrollbar { display: none; }
        .reel-item {
            height: 100vh;
            scroll-snap-align: start;
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
        }

        /* Glassmorphism for sidebar icons */
        .icon-shadow {
            text-shadow: 0 2px 8px rgba(0, 0, 0, 0.5);
        }

        /* Header Tabs Animation */
        .header-tab { position: relative; transition: all 0.3s ease; }
        .active-tab::after {
            content: '';
            position: absolute;
            bottom: -5px;
            left: 50%;
            transform: translateX(-50%);
            width: 4px;
            height: 4px;
            background-color: white;
            border-radius: 50%;
        }
    </style>
</head>
<body>

    <div class="fixed top-10 left-0 w-full z-50 flex justify-center items-center px-6 text-white/80 font-bold space-x-6">
        <button class="header-tab active-tab text-white text-lg">Reels</button>
        <button class="header-tab hover:text-white transition-all text-lg opacity-60">Friends</button>
        
        <div class="absolute right-6">
            <i class="fas fa-camera text-xl opacity-90"></i>
        </div>
    </div>

    <div class="reels-container">

        <div class="reel-item">
            <img src="https://via.placeholder.com/1080x1920?text=Reel+Experience+1" class="absolute inset-0 w-full h-full object-cover">
            
            <div class="absolute inset-0 bg-gradient-to-t from-black/80 via-transparent to-black/20"></div>

            <div class="absolute right-3 bottom-28 flex flex-col items-center space-y-5 text-white z-20">
                <div class="relative mb-2">
                    <div class="w-10 h-10 rounded-full border-2 border-white overflow-hidden shadow-lg">
                        <img src="https://via.placeholder.com/100" class="w-full h-full object-cover">
                    </div>
                    <div class="absolute -bottom-2 left-1/2 -translate-x-1/2 bg-red-500 rounded-full w-4 h-4 flex items-center justify-center border-2 border-black">
                        <i class="fas fa-plus text-[8px]"></i>
                    </div>
                </div>

                <div class="flex flex-col items-center group cursor-pointer">
                    <i class="fas fa-heart text-2xl icon-shadow transition-transform group-active:scale-125"></i>
                    <span class="text-[11px] mt-1 font-bold">258K</span>
                </div>

                <div class="flex flex-col items-center group cursor-pointer">
                    <i class="far fa-comment-dots text-2xl icon-shadow transform -scale-x-100"></i>
                    <span class="text-[11px] mt-1 font-bold">2,152</span>
                </div>

                <div class="flex flex-col items-center group cursor-pointer">
                    <i class="far fa-paper-plane text-2xl icon-shadow"></i>
                    <span class="text-[11px] mt-1 font-bold">3,372</span>
                </div>

                <div class="flex flex-col items-center group cursor-pointer">
                    <i class="far fa-bookmark text-2xl icon-shadow"></i>
                    <span class="text-[11px] mt-1 font-bold">8,504</span>
                </div>

                <i class="fas fa-ellipsis-h text-xl mt-2 cursor-pointer"></i>

                <div class="w-8 h-8 rounded-full border-4 border-gray-600 bg-black mt-4 animate-spin-slow overflow-hidden">
                    <img src="https://via.placeholder.com/50" class="w-full h-full object-cover rounded-full">
                </div>
            </div>

            <div class="relative p-4 text-white mb-20 max-w-[85%] z-10">
                <div class="flex items-center space-x-3 mb-3">
                    <h3 class="font-bold text-sm hover:underline cursor-pointer">sonyakisa8 <i class="fas fa-check-circle text-blue-400 text-[10px] ml-1"></i></h3>
                    <button class="border border-white/60 px-3 py-1 rounded-lg text-[10px] font-bold hover:bg-white/10 transition-all">Follow</button>
                </div>
                
                <p class="text-xs leading-relaxed line-clamp-2 opacity-95">🐱 #cat #funny #shadow_experience... ម៉ាក់ៗមើលមកខ្ញុំបន្តិចមក! ❤️✨</p>
                
                <div class="flex items-center space-x-2 mt-4 bg-white/10 backdrop-blur-sm px-3 py-1.5 rounded-full w-max">
                    <i class="fas fa-music text-[8px] animate-pulse"></i>
                    <span class="text-[10px] tracking-tight">sonyakisa8 • Original Audio</span>
                </div>
            </div>
        </div>

        <div class="reel-item">
            <img src="https://via.placeholder.com/1080x1920?text=Shadow+Novel+Story" class="absolute inset-0 w-full h-full object-cover">
            <div class="absolute inset-0 bg-gradient-to-t from-black/80 via-transparent to-black/20"></div>
            </div>

    </div>

    <footer class="fixed bottom-0 w-full bg-black/40 backdrop-blur-lg border-t border-white/10 flex justify-around items-center py-4 z-50">
        <a href="index.html" class="text-white text-xl"><i class="fas fa-home"></i></a>
        <a href="fast.html" class="text-white text-2xl border-2 border-white rounded-lg p-1 px-1.5"><i class="fas fa-play"></i></a>
        <div class="w-6 h-6 rounded-md border-2 border-white overflow-hidden">
            <img src="https://via.placeholder.com/50" class="w-full h-full object-cover">
        </div>
    </footer>

    <script>
        // បន្ថែមចលនាបង្វិលថាសតន្ត្រី
        document.querySelectorAll('.animate-spin-slow').forEach(el => {
            el.style.animation = 'spin 3s linear infinite';
        });

        const style = document.createElement('style');
        style.innerHTML = `@keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }`;
        document.head.appendChild(style);
    </script>

</body>
</html>
