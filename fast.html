<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shadow Fast - Experience</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Kantumruy+Pro:wght@400;600;700&display=swap');
        
        body { 
            font-family: 'Kantumruy Pro', sans-serif; 
            background-color: #000; 
            margin: 0; 
            overflow: hidden; 
        }

        /* បង្កើត Scroll បែប TikTok/Reels */
        .reels-container {
            height: 100vh;
            overflow-y: scroll;
            scroll-snap-type: y mandatory;
            scroll-behavior: smooth;
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        .reels-container::-webkit-scrollbar { display: none; }

        .reel-item {
            height: 100vh;
            scroll-snap-align: start;
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            background-color: #111;
        }

        /* Glassmorphism Effect */
        .glass-ui {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        /* Progress Bar Animation */
        .progress-bar {
            height: 2px;
            background: #3b82f6;
            width: 0%;
            animation: progress 5s linear infinite;
        }
        @keyframes progress {
            from { width: 0%; }
            to { width: 100%; }
        }

        /* Floating Heart Animation */
        @keyframes floatUp {
            0% { transform: translateY(0) scale(1); opacity: 1; }
            100% { transform: translateY(-100px) scale(1.5); opacity: 0; }
        }
        .heart-pop {
            animation: floatUp 0.8s ease-out forwards;
        }
    </style>
</head>
<body>

    <a href="index.html" class="fixed top-8 left-4 z-50 glass-ui w-10 h-10 rounded-full flex items-center justify-center text-white">
        <i class="fas fa-arrow-left"></i>
    </a>

    <div class="fixed top-0 left-0 w-full z-50 flex space-x-1 p-1">
        <div class="h-1 flex-1 bg-white/20 rounded-full overflow-hidden"><div class="progress-bar"></div></div>
        <div class="h-1 flex-1 bg-white/20 rounded-full"></div>
        <div class="h-1 flex-1 bg-white/20 rounded-full"></div>
    </div>

    <div class="reels-container">

        <div class="reel-item">
            <img src="https://via.placeholder.com/1080x1920?text=Shadow+Novel+Reel+1" class="absolute inset-0 w-full h-full object-cover">
            
            <div class="absolute inset-0 bg-gradient-to-t from-black/90 via-transparent to-black/30"></div>

            <div class="absolute right-4 bottom-36 flex flex-col space-y-6 text-white text-center z-20">
                <div class="flex flex-col items-center group cursor-pointer" onclick="showHeart(this)">
                    <div class="w-12 h-12 glass-ui rounded-full flex items-center justify-center mb-1 group-hover:bg-red-500 transition-all">
                        <i class="fas fa-heart text-xl"></i>
                    </div>
                    <span class="text-[10px] font-bold">24.5K</span>
                </div>
                <div class="flex flex-col items-center group cursor-pointer">
                    <div class="w-12 h-12 glass-ui rounded-full flex items-center justify-center mb-1 group-hover:bg-blue-500 transition-all">
                        <i class="fas fa-comment-dots text-xl"></i>
                    </div>
                    <span class="text-[10px] font-bold">1.2K</span>
                </div>
                <div class="flex flex-col items-center group cursor-pointer">
                    <div class="w-12 h-12 glass-ui rounded-full flex items-center justify-center mb-1 group-hover:bg-green-500 transition-all">
                        <i class="fas fa-share text-xl"></i>
                    </div>
                    <span class="text-[10px] font-bold">Share</span>
                </div>
            </div>

            <div class="relative p-6 text-white mb-8 z-10">
                <div class="flex items-center space-x-3 mb-4">
                    <div class="w-11 h-11 rounded-full border-2 border-blue-500 overflow-hidden shadow-lg">
                        <img src="https://via.placeholder.com/100" class="w-full h-full object-cover">
                    </div>
                    <div>
                        <h3 class="font-bold text-base leading-none">Shadow Creator</h3>
                        <p class="text-[10px] opacity-70 mt-1">@shadow_official • Following</p>
                    </div>
                </div>
                
                <h2 class="text-xl font-bold mb-2">Shadow Bride: កិច្ចសន្យាឈាម</h2>
                <p class="text-sm opacity-80 mb-6 line-clamp-2 leading-relaxed">
                    តើអ្នកនឹងជ្រើសរើសអ្វី បើរវាងសេចក្តីស្រឡាញ់ និងការសងសឹក? 🥀 #ShadowFast #NovelKhmer #Drama
                </p>

                <a href="#" class="inline-flex items-center space-x-3 bg-white text-black px-6 py-3 rounded-2xl font-bold text-sm shadow-xl hover:bg-blue-500 hover:text-white transition-all active:scale-95">
                    <i class="fas fa-book-open"></i>
                    <span>START READING</span>
                </a>
            </div>
        </div>

        <div class="reel-item">
            <img src="https://via.placeholder.com/1080x1920?text=Shadow+Novel+Reel+2" class="absolute inset-0 w-full h-full object-cover">
            <div class="absolute inset-0 bg-gradient-to-t from-black/90 via-transparent to-black/30"></div>
            <div class="relative p-6 text-white mb-8 z-10">
                <h3 class="font-bold text-lg mb-2">@Master_Shadow</h3>
                <p class="text-sm opacity-80 mb-6">វគ្គថ្មីបានចេញផ្សាយហើយ! កុំភ្លេចចូលរួមអានទាំងអស់គ្នា។ ⚡️</p>
                <a href="#" class="inline-flex items-center space-x-3 bg-blue-600 text-white px-8 py-3 rounded-2xl font-bold text-sm shadow-xl">
                    <i class="fas fa-play"></i>
                    <span>READ NOW</span>
                </a>
            </div>
        </div>

    </div>

    <script>
        function showHeart(element) {
            const heart = document.createElement('i');
            heart.className = 'fas fa-heart absolute text-red-500 text-2xl heart-pop';
            element.appendChild(heart);
            setTimeout(() => { heart.remove(); }, 800);
        }
    </script>

</body>
</html>
